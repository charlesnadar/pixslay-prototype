<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PixSlay Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&d<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PixSlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #E8E4DF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    .phone {
      width: 390px;
      height: 844px;
      background: #F8F7F5;
      border-radius: 50px;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
      box-shadow: 0 0 0 8px #2E2A26, 0 0 0 10px #1A1610, 0 32px 64px rgba(0,0,0,.35);
    }

    /* Mobile: fills screen edge to edge like a native app */
    @media (max-width: 500px) {
      body {
        padding: 0;
        background: #F8F7F5;
        align-items: flex-start;
        overflow: hidden;
      }
      .phone {
        width: 100vw;
        height: 100svh;
        border-radius: 0;
        box-shadow: none;
      }
    }

    /* Fallback for browsers without svh support */
    @supports not (height: 100svh) {
      @media (max-width: 500px) {
        .phone { height: 100vh; }
      }
    }

    /* OTP error shake */
    @keyframes otpShake {
      0%,100% { transform:translateX(0); }
      18%     { transform:translateX(-6px); }
      36%     { transform:translateX(6px); }
      54%     { transform:translateX(-4px); }
      72%     { transform:translateX(4px); }
      90%     { transform:translateX(-2px); }
    }
    .otp-shake { animation:otpShake .4s ease; }

    /* Hide scrollbars on horizontal scroll rows — mobile users
       recognise partially-clipped content as a scroll cue */
    .hscroll { -ms-overflow-style:none; scrollbar-width:none; }
    .hscroll::-webkit-scrollbar { display:none; }

    /* Primary photo browsing experiences should use visually hidden scrollbars
       for a cleaner and more immersive experience. Momentum scrolling is
       preserved via -webkit-overflow-scrolling:touch. */
    .pscroll { -ms-overflow-style:none; scrollbar-width:none;
               -webkit-overflow-scrolling:touch; }
    .pscroll::-webkit-scrollbar { display:none; }
  </style>
</head>
<body>
  <div class="phone" id="phone"></div>

  <script>
    /* ─────────────────────────────────────────────────────
       DESIGN TOKENS
       Single source of truth. Never hardcode hex values inline.
    ───────────────────────────────────────────────────── */
    var T = {
      blue:    '#1B4FD8',
      blueH:   '#2960F5',
      blueTint:'#EEF2FD',
      blueBdr: '#C7D4FB',
      blueDk:  '#0C447C',
      blueDp:  '#185FA5',
      white:   '#FFFFFF',
      bgWarm:  '#F8F7F5',
      bgSub:   '#F0EEEB',
      text:    '#1A1917',
      textS:   '#6B6864',
      textT:   '#A8A49F',
      textD:   '#D4D1CC',
      ok:      '#0F9E6E',
      alert:   '#E8490F',
      amber:   '#F5A623',
    };

    /* ─────────────────────────────────────────────────────
       STATE + NAVIGATION
    ───────────────────────────────────────────────────── */
    var state = {
      screen:    'varun-reg',
      journey:   'varun',
      completed: [],
      backOnce:  false,
      /* Trip timing — pre-filled from group creation, editable in sync sheet */
      syncTiming: {
        fromDate: 'Sat 24 May',
        fromTime: '8:00 AM',
        toDate:   'Sun 25 May',
        toTime:   '6:00 PM',
      },
    };

    function go(s) {
      state.screen   = s;
      state.backOnce = false;
      render();
    }

    /* ─────────────────────────────────────────────────────
       UTILITY: TOAST
       Slides down from top of phone frame. Auto-dismisses 3s.
    ───────────────────────────────────────────────────── */
    function showToast(msg, type) {
      var old = document.getElementById('toast');
      if (old) old.remove();

      var bg = (type === 'error') ? T.alert : T.ok;
      var t  = document.createElement('div');
      t.id = 'toast';
      t.setAttribute('style',
        'position:absolute;top:-52px;left:16px;right:16px;' +
        'height:48px;background:' + bg + ';border-radius:12px;' +
        'z-index:10000;display:flex;align-items:center;' +
        'padding:0 16px;font-family:inherit;' +
        'font-size:13px;font-weight:600;color:#fff;' +
        'transition:top .2s cubic-bezier(0.4,0,0.2,1);'
      );
      t.textContent = msg;
      document.getElementById('phone').appendChild(t);

      requestAnimationFrame(function () {
        requestAnimationFrame(function () { t.style.top = '16px'; });
      });
      setTimeout(function () {
        t.style.top = '-52px';
        setTimeout(function () { if (t.parentNode) t.remove(); }, 220);
      }, 3000);
    }

    /* ─────────────────────────────────────────────────────
       UTILITY: LOGO
       Icon per DESIGN.md: 44px square, 12px radius, #1B4FD8.
       Photo frame with corner brackets + viewfinder circle + dot.
       Wordmark: "Pi" + blue "x" + "slay", weight 800.
    ───────────────────────────────────────────────────── */
    function logo(iconPx, textPx) {
      iconPx = iconPx || 28;
      textPx = textPx || 22;
      var r     = Math.round(iconPx * 0.27);   /* ~12px on 44px icon */
      var inner = Math.round(iconPx * 0.62);

      return (
        '<div style="display:flex;align-items:center;gap:8px;">' +
          '<div style="' +
            'width:' + iconPx + 'px;' +
            'height:' + iconPx + 'px;' +
            'background:' + T.blue + ';' +
            'border-radius:' + r + 'px;' +
            'display:flex;align-items:center;justify-content:center;' +
            'flex-shrink:0;">' +
            /* Photo frame rect + corner brackets + viewfinder circle + inner dot */
            '<svg width="' + inner + '" height="' + inner + '"' +
                 ' viewBox="0 0 20 20" fill="none"' +
                 ' stroke="white" stroke-width="2"' +
                 ' stroke-linecap="round" stroke-linejoin="round">' +
              '<rect x="1" y="3" width="18" height="14" rx="2"/>' +
              '<polyline points="1,6.5 1,3 4.5,3"   stroke-width="2.2"/>' +
              '<polyline points="15.5,3 19,3 19,6.5" stroke-width="2.2"/>' +
              '<polyline points="1,13.5 1,17 4.5,17"   stroke-width="2.2"/>' +
              '<polyline points="15.5,17 19,17 19,13.5" stroke-width="2.2"/>' +
              '<circle cx="10" cy="10" r="3.2"/>' +
              '<circle cx="10" cy="10" r="1" fill="white" stroke="none"/>' +
            '</svg>' +
          '</div>' +
          /* Wordmark: Pi [x in blue] slay */
          '<span style="font-size:' + textPx + 'px;font-weight:800;' +
               'letter-spacing:-0.3px;font-family:inherit;">' +
            '<span style="color:' + T.text + ';">Pi</span>' +
            '<span style="color:' + T.blue + ';">x</span>' +
            '<span style="color:' + T.text + ';">slay</span>' +
          '</span>' +
        '</div>'
      );
    }

    /* ─────────────────────────────────────────────────────
       UTILITY: SWITCH JOURNEY PILL
       Appears on every screen. position:absolute, z:9999.
       Tapping always returns to entry from anywhere.
    ───────────────────────────────────────────────────── */
    function switchPill() {
      return (
        '<button onclick="go(\'entry\')" style="' +
          'position:absolute;top:6px;left:50%;transform:translateX(-50%);' +
          'z-index:9999;background:#fff;border:0.5px solid ' + T.blue + ';' +
          'border-radius:20px;padding:4px 12px;font-family:inherit;' +
          'font-size:10px;font-weight:500;color:' + T.blue + ';' +
          'cursor:pointer;white-space:nowrap;">' +
          'Switch journey' +
        '</button>'
      );
    }

    /* ─────────────────────────────────────────────────────
       UTILITY: STATUS BAR
       44px. Time left, signal+wifi+battery right.
    ───────────────────────────────────────────────────── */
    function sbar(bg) {
      bg = bg || '#fff';
      return (
        '<div style="' +
          'height:44px;background:' + bg + ';' +
          'display:flex;align-items:center;' +
          'justify-content:space-between;' +
          'padding:0 20px;flex-shrink:0;">' +
          '<span style="font-size:13px;font-weight:600;color:' + T.text + ';">9:41</span>' +
          '<div style="display:flex;align-items:center;gap:6px;">' +
            /* Signal */
            '<svg width="17" height="12" viewBox="0 0 17 12" fill="' + T.text + '">' +
              '<rect x="0"    y="8"   width="3" height="4"   rx="0.5"/>' +
              '<rect x="4.5"  y="5.5" width="3" height="6.5" rx="0.5"/>' +
              '<rect x="9"    y="2.5" width="3" height="9.5" rx="0.5"/>' +
              '<rect x="13.5" y="0"   width="3" height="12"  rx="0.5" opacity="0.3"/>' +
            '</svg>' +
            /* WiFi */
            '<svg width="16" height="12" viewBox="0 0 16 12"' +
                 ' fill="none" stroke="' + T.text + '"' +
                 ' stroke-width="1.5" stroke-linecap="round">' +
              '<path d="M1 4.5C3.5 2 12.5 2 15 4.5"/>' +
              '<path d="M3.5 7C5.3 5.3 10.7 5.3 12.5 7"/>' +
              '<path d="M6 9.5C6.9 8.7 9.1 8.7 10 9.5"/>' +
              '<circle cx="8" cy="11.5" r="0.8" fill="' + T.text + '" stroke="none"/>' +
            '</svg>' +
            /* Battery */
            '<svg width="25" height="12" viewBox="0 0 25 12" fill="none">' +
              '<rect x="0.5" y="0.5" width="21" height="11" rx="3"' +
                   ' stroke="' + T.text + '" stroke-width="1"/>' +
              '<rect x="2" y="2" width="16" height="8" rx="2" fill="' + T.text + '"/>' +
              '<path d="M22.5 4v4a2 2 0 0 0 0-4z"' +
                   ' fill="' + T.text + '" opacity="0.4"/>' +
            '</svg>' +
          '</div>' +
        '</div>'
      );
    }

    /* ─────────────────────────────────────────────────────
       COMPONENT: floatInput
       ─────────────────────────────────────────────────────
       CRITICAL per TECHNICAL.md: label position controlled
       entirely via inline onfocus/onblur style manipulation.
       DO NOT use CSS ~ sibling selectors — they fail on
       dynamically injected innerHTML in all browsers.

       States:
         Empty:  label centred vertically (acts as watermark)
         Focus:  label floats to top, border → blue
         Filled: label stays at top, border → light blue
    ───────────────────────────────────────────────────── */
    function floatInput(label, id, value, type, oninputCb, inputmode) {
      value     = (value  === undefined || value  === null) ? '' : String(value);
      type      = type    || 'text';
      oninputCb = oninputCb || '';
      inputmode = inputmode || (type === 'tel' ? 'numeric' : 'text');

      var filled = value.length > 0;

      /* Label position constants — embedded in inline style strings */
      var FLOATED = 'top:0;transform:translateY(-50%);font-size:11px;font-weight:600;padding:0 4px;';
      var RESTING = 'top:50%;transform:translateY(-50%);font-size:14px;font-weight:400;padding:0;';
      var BASE    = 'position:absolute;left:14px;background:#fff;pointer-events:none;transition:all .15s;';

      var initLbl    = BASE + (filled
        ? FLOATED + 'color:' + T.textT + ';'
        : RESTING + 'color:' + T.textT + ';');
      var initBorder = filled ? '0.5px solid ' + T.blueBdr : '0.5px solid ' + T.bgSub;

      var focusHandler = (
        'var l=document.getElementById(\'' + id + '-lbl\');' +
        'if(l) l.style.cssText=\'' + BASE + FLOATED + 'color:' + T.blue + ';\';' +
        'this.style.border=\'1px solid ' + T.blue + '\';'
      );
      var blurHandler = (
        'var l=document.getElementById(\'' + id + '-lbl\');' +
        'if(this.value){' +
          'if(l) l.style.cssText=\'' + BASE + FLOATED + 'color:' + T.textT + ';\';' +
          'this.style.border=\'0.5px solid ' + T.blueBdr + '\';' +
        '} else {' +
          'if(l) l.style.cssText=\'' + BASE + RESTING + 'color:' + T.textT + ';\';' +
          'this.style.border=\'0.5px solid ' + T.bgSub + '\';}' +
        'this.style.color=\'' + T.text + '\';'
      );

      return (
        '<div style="position:relative;margin-bottom:12px;">' +
          '<input' +
            ' id="' + id + '"' +
            ' type="' + type + '"' +
            ' inputmode="' + inputmode + '"' +
            ' value="' + value + '"' +
            ' autocomplete="off"' +
            ' style="' +
              'width:100%;height:46px;' +
              'border:' + initBorder + ';' +
              'border-radius:10px;' +
              'padding:' + (filled ? '14px 14px 3px' : '0 14px') + ';' +
              'font-family:inherit;font-size:14px;font-weight:400;' +
              'color:' + T.text + ';' +
              'background:#fff;outline:none;' +
              'transition:border .15s,padding .15s;"' +
            ' onfocus="' + focusHandler + 'this.style.padding=\'14px 14px 3px\';"' +
            ' onblur="'  + blurHandler  + 'if(!this.value) this.style.padding=\'0 14px\';"' +
            (oninputCb ? ' oninput="' + oninputCb + '"' : '') +
          '>' +
          '<label' +
            ' id="' + id + '-lbl"' +
            ' for="' + id + '"' +
            ' style="' + initLbl + '"' +
          '>' + label + '</label>' +
        '</div>'
      );
    }

    /* ─────────────────────────────────────────────────────
       PHONE INPUT HANDLER
       Activates Continue when 10 digits are entered.
    ───────────────────────────────────────────────────── */
    function onPhoneInput(el) {
      var btn = document.getElementById('continue-btn');
      if (!btn) return;
      var ok = el.value.replace(/\D/g, '').length >= 1;
      btn.disabled         = !ok;
      btn.style.background = ok ? T.blue    : T.bgSub;
      btn.style.color      = ok ? '#fff'    : T.textT;
      btn.style.cursor     = ok ? 'pointer' : 'default';
    }

    /* ─────────────────────────────────────────────────────
       BACK HANDLER — single tap returns to entry
    ───────────────────────────────────────────────────── */
    function handleBack() {
      go('entry');
    }

    /* ═════════════════════════════════════════════════════
       SCREEN: varun-reg  (Varun — Screen 1: Phone Registration)
       ─────────────────────────────────────────────────────
       Layout (top → bottom):
         Switch Journey pill (absolute z:9999)
         Status bar (44px, flex-shrink:0)
         Scrollable body (flex:1, overflow-y:auto):
           Logo centered, 60px padding-top
           Headline 24px/800
           Subhead 13px/400
           Phone floatInput pre-filled "+91"
           Hint 11px/500 centred
           Flex spacer
         Button area (flex-shrink:0, pinned to bottom):
           Continue 50px primary (disabled until 10 digits)
           Back 44px ghost (always enabled)
    ═════════════════════════════════════════════════════ */
    function screenVarunReg() {
      return (
        '<div class="screen"' +
             ' style="position:absolute;inset:0;' +
                    'display:flex;flex-direction:column;' +
                    'background:#fff;">' +

          switchPill() +
          sbar('#fff') +

          /* ── Scrollable body ── */
          '<div style="flex:1;overflow-y:auto;padding:0 16px;' +
               'display:flex;flex-direction:column;">' +

            /* Logo: left-aligned, matches headline/copy margin */
            '<div style="padding-top:60px;margin-bottom:40px;">' +
              logo(28, 22) +
            '</div>' +

            /* Headline: 24px 800 #1A1917, left-aligned (parent provides 16px margin) */
            '<h1 style="font-size:24px;font-weight:800;' +
                       'color:' + T.text + ';letter-spacing:-0.5px;' +
                       'line-height:1.25;margin-bottom:8px;">' +
              'Your photos from every gathering.' +
            '</h1>' +

            /* Subhead: 13px 400 #6B6864 */
            '<p style="font-size:13px;font-weight:400;' +
                      'color:' + T.textS + ';line-height:1.55;' +
                      'margin-bottom:28px;">' +
              'Start with your number. We\'ll send a quick code.' +
            '</p>' +

            /* Phone field: empty, label acts as watermark */
            floatInput('Your phone number', 'phone-inp', '', 'tel', 'onPhoneInput(this)') +

            /* Hint: 11px 500 #A8A49F left-aligned to match headline/subhead */
            '<p style="font-size:11px;font-weight:500;' +
                      'color:' + T.textT + ';' +
                      'margin-top:4px;">' +
              'We\'ll send a one-time code to verify.' +
            '</p>' +

            /* Spacer: absorbs extra height; keyboard pushes buttons up on mobile */
            '<div style="flex:1;min-height:24px;"></div>' +

          '</div>' +

          /* ── Button area — pinned to bottom ── */
          '<div style="padding:0 16px 32px;flex-shrink:0;">' +

            /* Continue — primary 50px, 12px radius, full width */
            /* Disabled: bg #F0EEEB text #A8A49F cursor default     */
            /* Active:   bg #1B4FD8 text #fff   cursor pointer      */
            '<button id="continue-btn" disabled' +
              ' onclick="if(!this.disabled) go(\'varun-otp\')"' +
              ' style="' +
                'display:block;width:100%;height:50px;' +
                'border-radius:12px;border:none;' +
                'background:' + T.bgSub + ';color:' + T.textT + ';' +
                'font-family:inherit;font-size:15px;font-weight:600;' +
                'cursor:default;margin-bottom:8px;' +
                'transition:background .15s,color .15s;">' +
              'Continue' +
            '</button>' +

            /* Back — ghost 44px, same width, always enabled */
            '<button onclick="handleBack()"' +
              ' style="' +
                'display:block;width:100%;height:44px;' +
                'border-radius:12px;border:none;' +
                'background:transparent;color:' + T.textS + ';' +
                'font-family:inherit;font-size:13px;font-weight:500;' +
                'cursor:pointer;">' +
              'Back' +
            '</button>' +

          '</div>' +

        '</div>'
      );
    }

    /* ─────────────────────────────────────────────────────
       OTP — GLOBALS
       Timer IDs stored here so postRender can cancel old ones
       when the screen is re-entered or navigated away from.
    ───────────────────────────────────────────────────── */
    var otpResendInt = null;
    var otpExpiryTO  = null;
    var otpSecs      = 30;

    /* Auto-advance on digit entry. Auto-submit on 6th box. */
    function otpInput(id, i, dest, el) {
      el.value = el.value.replace(/[^0-9]/g, '').slice(-1);
      if (el.value) {
        el.style.background = T.blueTint;
        el.style.border     = '0.5px solid ' + T.blueBdr;
        var next = document.getElementById(id + '-' + (i + 1));
        if (next) {
          next.focus();
        } else {
          setTimeout(function () { go(dest); }, 300);
        }
      }
      /* Reset inactivity expiry timer on every keystroke */
      if (otpExpiryTO) clearTimeout(otpExpiryTO);
      otpExpiryTO = setTimeout(otpExpire, 10000);
    }

    /* Backspace on empty box focuses the previous box */
    function otpBack(id, i, e) {
      if (e.key === 'Backspace') {
        var el = document.getElementById(id + '-' + i);
        if (el && !el.value && i > 0) {
          var prev = document.getElementById(id + '-' + (i - 1));
          if (prev) {
            prev.value = '';
            prev.style.background = '#fff';
            prev.style.border = '0.5px solid ' + T.bgSub;
            prev.focus();
          }
        }
      }
    }

    /* Tick the resend countdown every second */
    function otpTick() {
      var el = document.getElementById('otp-resend');
      if (!el) { clearInterval(otpResendInt); return; }
      otpSecs--;
      if (otpSecs <= 0) {
        clearInterval(otpResendInt);
        el.innerHTML =
          '<button onclick="otpResend()" style="' +
            'background:none;border:none;font-family:inherit;' +
            'font-size:13px;font-weight:600;' +
            'color:' + T.blue + ';cursor:pointer;">' +
            'Resend code' +
          '</button>';
      } else {
        el.textContent = 'Resend in 0:' + (otpSecs < 10 ? '0' : '') + otpSecs;
      }
    }

    /* Resend tapped — clear boxes, reset countdown, refocus */
    function otpResend() {
      for (var i = 0; i < 4; i++) {
        var box = document.getElementById('otp-' + i);
        if (box) {
          box.value = '';
          box.style.background = '#fff';
          box.style.border = '0.5px solid ' + T.bgSub;
        }
      }
      var err = document.getElementById('otp-err');
      if (err) err.style.visibility = 'hidden';
      otpSecs = 30;
      clearInterval(otpResendInt);
      otpResendInt = setInterval(otpTick, 1000);
      var resendEl = document.getElementById('otp-resend');
      if (resendEl) resendEl.textContent = 'Resend in 0:30';
      clearTimeout(otpExpiryTO);
      otpExpiryTO = setTimeout(otpExpire, 10000);
      var first = document.getElementById('otp-0');
      if (first) first.focus();
    }

    /* 10 s inactivity — show expired message and reset countdown */
    function otpExpire() {
      var err = document.getElementById('otp-err');
      if (!err) return;
      err.textContent = 'Code expired. A new one has been sent.';
      err.style.visibility = 'visible';
      otpSecs = 30;
      clearInterval(otpResendInt);
      otpResendInt = setInterval(otpTick, 1000);
      var resendEl = document.getElementById('otp-resend');
      if (resendEl) resendEl.textContent = 'Resend in 0:30';
    }

    /* ─────────────────────────────────────────────────────
       PROFILE — GLOBALS + HELPERS
    ───────────────────────────────────────────────────── */
    var avatarSet = false;

    function onNameInput(el) {
      var btn = document.getElementById('profile-continue-btn');
      if (!btn) return;
      var ok = el.value.trim().length >= 2;
      btn.disabled         = !ok;
      btn.style.background = ok ? T.blue   : T.bgSub;
      btn.style.color      = ok ? '#fff'   : T.textT;
      btn.style.cursor     = ok ? 'pointer': 'default';
    }

    function avatarTap() {
      if (!avatarSet) { setDummyAvatar(); }
      else            { showAvatarSheet(); }
    }

    function setDummyAvatar() {
      avatarSet = true;
      var c = document.getElementById('avatar-circle');
      if (!c) return;
      c.style.background = 'linear-gradient(135deg,' + T.blueH + ',' + T.blue + ')';
      c.style.border     = 'none';
      c.innerHTML = (
        '<span style="font-size:22px;font-weight:800;color:#fff;' +
                     'letter-spacing:-0.5px;pointer-events:none;">VR</span>' +

    function showAvatarSheet() {
      var phone = document.getElementById('phone');
      var old   = document.getElementById('avatar-sheet-overlay');
      if (old) old.remove();

      var overlay = document.createElement('div');
      overlay.id  = 'avatar-sheet-overlay';
      overlay.setAttribute('style',
        'position:absolute;inset:0;' +
        'background:rgba(0,0,0,0.4);z-index:8000;' +
        'display:flex;align-items:flex-end;'

      overlay.innerHTML = (
        '<div onclick="event.stopPropagation()"' +
             ' style="width:100%;background:#fff;' +
                    'border-radius:20px 20px 0 0;' +
                    'padding:12px 0 36px;' +

               ' style="height:52px;display:flex;align-items:center;' +
                      'padding:0 20px;gap:14px;cursor:pointer;">' +
            '<svg width="20" height="20" viewBox="0 0 24 24" fill="none"' +

                 ' stroke-linecap="round" stroke-linejoin="round">' +
              '<path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8' +

              '<circle cx="12" cy="13" r="4"/>' +
            '</svg>' +
            '<span style="font-size:15px;font-weight:500;color:' + T.text + ';">' +
              'Change photo' +
            '</span>' +
          '</div>' +
          /* Remove photo */
          '<div onclick="removeAvatar()"' +
               ' style="height:52px;display:flex;align-items:center;' +
                      'padding:0 20px;gap:14px;cursor:pointer;">' +
            '<svg width="20" height="20" viewBox="0 0 24 24" fill="none"' +
                 ' stroke="' + T.alert + '" stroke-width="1.5"' +
                 ' stroke-linecap="round" stroke-linejoin="round">' +
              '<polyline points="3 6 5 6 21 6"/>' +
              '<path d="M19 6l-1 14H6L5 6"/>' +
              '<path d="M10 11v6"/><path d="M14 11v6"/>' +
              '<path d="M9 6V4h6v2"/>' +
            '</svg>' +
            '<span style="font-size:15px;font-weight:500;color:' + T.alert + ';">' +
              'Remove photo' +
            '</span>' +
          '</div>' +
        '</div>'
      );

      phone.appendChild(overlay);
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          var sheet = overlay.firstElementChild;
          if (sheet) sheet.style.transform = 'translateY(0)';
        });
      });
    }

    function closeAvatarSheet() {
      var overlay = document.getElementById('avatar-sheet-overlay');
      if (!overlay) return;
      var sheet = overlay.firstElementChild;
      if (sheet) sheet.style.transform = 'translateY(100%)';
      setTimeout(function () { if (overlay.parentNode) overlay.remove(); }, 260);
    }

    function closeSyncReassuranceSheet(startSync) {
      /* Save any edited field values back to state.syncTiming */
      var fd = document.getElementById('sr-from-date');
      var ft = document.getElementById('sr-from-time');
      var td = document.getElementById('sr-to-date');
      var tt = document.getElementById('sr-to-time');
      if (fd && fd.value) state.syncTiming.fromDate = fd.value;
      if (ft && ft.value) state.syncTiming.fromTime = ft.value;
      if (td && td.value) state.syncTiming.toDate   = td.value;
      if (tt && tt.value) state.syncTiming.toTime   = tt.value;

      var overlay = document.getElementById('sync-reassure-overlay');
      if (!overlay) return;
      var sheet = document.getElementById('sync-reassure-sheet');
      if (sheet) sheet.style.transform = 'translateY(100%)';
      setTimeout(function () {
        if (overlay.parentNode) overlay.remove();
        if (startSync) {
          syncUpdateCardToRunning();
          syncSetStickyState('syncing');
          syncStartPhase1();
        }
      }, 260);
    }

    /* Swap card content once permission granted and sync starts */
    function syncUpdateCardToRunning() {
      var title  = document.getElementById('sync-card-title');
      var sub    = document.getElementById('sync-card-sub');
      var win    = document.getElementById('sync-card-window');
      var status = document.getElementById('sync-card-status');
      var t      = state.syncTiming;
      if (title)  title.textContent  = 'You\'re all set for Karjat.';
      if (sub)    sub.textContent    = 'Just enjoy the trip and keep clicking photos.';
      if (win)    win.style.display  = 'none';
      if (status) {
        status.textContent = 'Looking from ' + t.fromDate + ', ' + t.fromTime +
                             ' to ' + t.toDate + ', ' + t.toTime;
        status.style.display = 'block';
      }
    }

    /* Swap sticky bottom area without re-rendering the whole screen */
    function syncSetStickyState(s) {
      var primary = document.getElementById('sync-primary-btn');
      if (!primary) return;
      if (s === 'syncing') {
        primary.textContent          = 'View my photos';
        primary.disabled             = true;
        primary.style.background     = T.bgSub;
        primary.style.color          = T.textT;
        primary.style.cursor         = 'default';
        primary.onclick              = null;
      } else if (s === 'done') {
        primary.textContent          = 'View my photos';
        primary.disabled             = false;
        primary.style.background     = T.blue;
        primary.style.color          = '#fff';
        primary.style.cursor         = 'pointer';
        primary.onclick              = function () { go('varun-tagging'); };
      }
    }

    function syncStartPhase1() {
      clearInterval(syncPhaseInt);
      syncPhaseInt = setInterval(function () {
        syncProg += 1.0;
        if (syncProg >= 60) {
          syncProg = 60;
          clearInterval(syncPhaseInt);
          syncUpdateBar(60);
          /* Show amber connection lost banner */
          var banner = document.getElementById('sync-amber');
          if (banner) {
            banner.style.display = 'flex';
            requestAnimationFrame(function () {
              requestAnimationFrame(function () { banner.style.opacity = '1'; });
            });
          }
          setTimeout(function () {
            var b = document.getElementById('sync-amber');
            if (b) {
              b.style.opacity = '0';
              setTimeout(function () { if (b) b.style.display = 'none'; }, 300);
            }
            syncStartPhase2();
          }, 1000);
        } else {
          syncUpdateBar(syncProg);
        }
      }, 25); /* 60 ticks × 25ms = 1500ms */
    }

    function syncStartPhase2() {
      clearInterval(syncPhaseInt);
      syncPhaseInt = setInterval(function () {
        syncProg += 1.0;
        if (syncProg >= 100) {
          syncProg = 100;
          clearInterval(syncPhaseInt);
          syncUpdateBar(100);
          syncComplete();
        } else {
          syncUpdateBar(syncProg);
        }
      }, 37); /* 40 ticks × 37ms ≈ 1480ms */
    }

    function syncComplete() {
      syncDone = true;
      /* Hide status line — trip window is shown inside results instead */
      var statusLine = document.getElementById('sync-card-status');
      if (statusLine) statusLine.style.display = 'none';
      var prog = document.getElementById('sync-progress-section');
      if (prog) {
        prog.style.transition = 'opacity .3s';
        prog.style.opacity    = '0';
        setTimeout(function () {
          if (prog.parentNode) prog.remove();
          var results = document.getElementById('sync-results');
          if (results) {
            results.style.display    = 'block';
            results.style.opacity    = '0';
            results.style.transition = 'opacity .3s';
            requestAnimationFrame(function () {
              requestAnimationFrame(function () { results.style.opacity = '1'; });
            });
          }
        }, 300);
      }
      syncSetStickyState('done');
    }

    function showSyncSheet() {

          g: 'linear-gradient(145deg,#3A2510,#8B5E3C)',
          s: '<polygon points="12,3 3,18 21,18" fill="rgba(255,255,255,.15)"/>' +
             '<polygon points="5,14 2,20 8,20" fill="rgba(255,255,255,.1)"/>' +
             '<polygon points="19,14 16,20 22,20" fill="rgba(255,255,255,.1)"/>' +
             '<line x1="1" y1="19" x2="23" y2="19" stroke="rgba(255,255,255,.3)" stroke-width="1.5"/>'
        },
        group:     {
          g: 'linear-gradient(145deg,#7A1515,#D04040)',
          s: '<circle cx="8" cy="9" r="3.5" stroke="rgba(255,255,255,.5)" stroke-width="1.5" fill="rgba(255,255,255,.1)"/>' +
             '<circle cx="16" cy="9" r="3.5" stroke="rgba(255,255,255,.5)" stroke-width="1.5" fill="rgba(255,255,255,.1)"/>' +
             '<path d="M2 21 Q2 15 8 15" stroke="rgba(255,255,255,.4)" stroke-width="1.5" fill="none"/>' +
             '<path d="M12 14 Q12 12 16 12 Q21 12 21 17 L21 21" stroke="rgba(255,255,255,.4)" stroke-width="1.5" fill="none"/>'
        }
      };
      var c = cfgs[scene] || cfgs.forest;
      return (
        '<div style="' +
          'width:100%;height:100%;' +
          'background:' + c.g + ';' +
          'display:flex;align-items:center;justify-content:center;">' +
          '<svg width="24" height="24" viewBox="0 0 24 24" fill="none"' +
               ' xmlns="http://www.w3.org/2000/svg">' +
            c.s +
          '</svg>' +
        '</div>'
      );
    }

    /* ─── single photo cell in grid ─── */
    function taggingPhotoCell(photo) {
      var isSel = (taggingSelected.indexOf(photo.id) !== -1);
      return (
        '<div id="photo-cell-' + photo.id + '"' +
             ' style="' +
               'position:relative;aspect-ratio:1;overflow:hidden;' +
               'cursor:pointer;background:#eee;"' +
             ' onclick="taggingTapPhoto(' + photo.id + ')"' +
             ' onmousedown="taggingLongStart(' + photo.id + ',event)"' +
             ' onmouseup="taggingLongEnd()"' +
             ' onmouseleave="taggingLongEnd()"' +
             ' ontouchstart="taggingLongStart(' + photo.id + ',event)"' +
             ' ontouchend="taggingLongEnd()"' +
             ' ontouchcancel="taggingLongEnd()">' +
          sceneThumb(photo.scene) +
          '<div id="check-' + photo.id + '"' +
               ' style="' +
                 'position:absolute;top:5px;left:5px;' +
                 'width:20px;height:20px;border-radius:50%;' +
                 'background:' + (isSel ? T.blue : 'rgba(255,255,255,.85)') + ';' +
                 'border:1.5px solid ' + (isSel ? T.blue : 'rgba(0,0,0,.25)') + ';' +
                 'display:' + (taggingSelectMode ? 'flex' : 'none') + ';' +
                 'align-items:center;justify-content:center;' +
                 'transition:background .12s,border-color .12s;">' +
            (isSel
              ? '<svg width="10" height="10" viewBox="0 0 12 12" fill="none">' +
                  '<polyline points="2,6 5,9 10,3" stroke="#fff" stroke-width="2"' +
                           ' stroke-linecap="round" stroke-linejoin="round"/>' +
                '</svg>'
              : '') +
          '</div>' +
        '</div>'
      );
    }

    /* ─── photo tap ─── */
    function taggingTapPhoto(id) {
      if (!taggingSelectMode) return;
      var idx = taggingSelected.indexOf(id);
      if (idx === -1) { taggingSelected.push(id); }
      else            { taggingSelected.splice(idx, 1); }
      var isSel = (taggingSelected.indexOf(id) !== -1);
      var chk = document.getElementById('check-' + id);
      if (chk) {
        chk.style.background   = isSel ? T.blue : 'rgba(255,255,255,.85)';
        chk.style.borderColor  = isSel ? T.blue : 'rgba(0,0,0,.25)';
        chk.innerHTML = isSel
          ? '<svg width="10" height="10" viewBox="0 0 12 12" fill="none">' +
              '<polyline points="2,6 5,9 10,3" stroke="#fff" stroke-width="2"' +
                       ' stroke-linecap="round" stroke-linejoin="round"/>' +
            '</svg>'
          : '';
      }
      var cnt = document.getElementById('tagging-sel-count');
      if (cnt) cnt.textContent = taggingSelected.length + ' selected';
      var fab = document.getElementById('tagging-share-fab');
      if (fab) fab.style.display = taggingSelected.length > 0 ? 'flex' : 'none';
      var lbl = document.getElementById('tagging-fab-label');
      if (lbl) lbl.textContent = 'Share (' + taggingSelected.length + ')';
    }

    /* ─── long press ─── */
    function taggingLongStart(id, e) {
      if (taggingSelectMode) return;
      taggingLongTimer = setTimeout(function () { taggingEnterSelect(id); }, 600);
    }
    function taggingLongEnd() {
      if (taggingLongTimer) { clearTimeout(taggingLongTimer); taggingLongTimer = null; }
    }

    function taggingEnterSelect(firstId) {
      taggingSelectMode = true;
      taggingSelected   = [firstId];
      for (var i = 0; i < TRIP_PHOTOS.length; i++) {
        var ph  = TRIP_PHOTOS[i];
        var chk = document.getElementById('check-' + ph.id);
        if (!chk) continue;
        chk.style.display = 'flex';
        if (ph.id === firstId) {
          chk.style.background  = T.blue;
          chk.style.borderColor = T.blue;
          chk.innerHTML =
            '<svg width="10" height="10" viewBox="0 0 12 12" fill="none">' +
              '<polyline points="2,6 5,9 10,3" stroke="#fff" stroke-width="2"' +
                       ' stroke-linecap="round" stroke-linejoin="round"/>' +
            '</svg>';
        }
      }
      /* Swap top bar to selection mode */
      var tb = document.getElementById('tagging-top-bar');
      if (tb) {
        tb.innerHTML = (
          '<button onclick="taggingExitSelect()"' +
            ' style="background:none;border:none;cursor:pointer;' +
                   'padding:4px 8px;color:' + T.blue + ';font-family:inherit;' +
                   'font-size:14px;font-weight:600;">Cancel</button>' +
          '<span id="tagging-sel-count"' +
                ' style="font-size:15px;font-weight:700;color:' + T.text + ';">' +
            '1 selected' +
          '</span>' +
          '<div style="width:72px;"></div>'
        );
      }
      var fab = document.getElementById('tagging-share-fab');
      if (fab) fab.style.display = 'flex';
      var lbl = document.getElementById('tagging-fab-label');
      if (lbl) lbl.textContent = 'Share (1)';
    }

    function taggingExitSelect() {
      taggingSelectMode = false;
      taggingSelected   = [];
      for (var i = 0; i < TRIP_PHOTOS.length; i++) {
        var chk = document.getElementById('check-' + TRIP_PHOTOS[i].id);
        if (chk) {
          chk.style.display     = 'none';
          chk.style.background  = 'rgba(255,255,255,.85)';
          chk.style.borderColor = 'rgba(0,0,0,.25)';
          chk.innerHTML         = '';
        }
      }
      taggingRestoreTopBar();
      var fab = document.getElementById('tagging-share-fab');
      if (fab) fab.style.display = 'none';
    }

    function taggingRestoreTopBar() {
      var tb = document.getElementById('tagging-top-bar');
      if (!tb) return;
      tb.innerHTML = (
        '<button onclick="go(\'varun-sync\')"' +
          ' style="width:36px;height:36px;border:none;background:none;cursor:pointer;' +
                 'display:flex;align-items:center;justify-content:center;padding:4px;">' +
          '<svg width="20" height="20" viewBox="0 0 24 24" fill="none"' +
               ' stroke="' + T.text + '" stroke-width="2"' +

            '<polyline points="15 18 9 12 15 6"/>' +
          '</svg>' +
        '</button>' +
        '<span style="font-size:16px;font-weight:700;color:' + T.text + ';">' +
          'Mumbai — Karjat' +
        '</span>' +
        '<div style="display:flex;gap:4px;">' +
          '<button onclick="taggingToggleSearch()"' +
            ' style="width:32px;height:32px;border:none;background:none;cursor:pointer;' +

            '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"' +

                 ' stroke-linecap="round" stroke-linejoin="round">' +
              '<circle cx="11" cy="11" r="8"/>' +

              '<circle cx="12" cy="5" r="1" fill="' + T.text + '" stroke="none"/>' +

    /* ─── face / people row filter ─── */
    function taggingSetFace(face) {
      taggingFaceFilter = (taggingFaceFilter === face) ? '' : face;
      /* Visual: ring on active avatar, fade others */
      var avIds  = ['VR','MA','KA','unk'];
      var avKeys = ['VR','MA','KA','?'];
      for (var i = 0; i < avIds.length; i++) {
        var wrap = document.getElementById('people-avatar-' + avIds[i]);
        if (!wrap) continue;
        var circle = wrap.querySelector('div');
        var on     = (taggingFaceFilter === avKeys[i]);
        if (circle) circle.style.boxShadow = on ? '0 0 0 3px ' + T.blue + ',0 0 0 5px rgba(27,79,216,.2)' : 'none';
        wrap.style.opacity = (!taggingFaceFilter || on) ? '1' : '0.4';
      }
      /* Photo opacity */
      for (var j = 0; j < TRIP_PHOTOS.length; j++) {
        var ph   = TRIP_PHOTOS[j];
        var cell = document.getElementById('photo-cell-' + ph.id);
        if (cell) cell.style.opacity = (!taggingFaceFilter || ph.by === taggingFaceFilter) ? '1' : '0.15';
      }
    }

    /* ─── filter bar ─── */
    function taggingSetFilterCat(cat) {
      taggingFilterCat = (taggingFilterCat === cat) ? '' : cat;
      taggingFilterSub = '';
      var cats = ['People','Scene','Format','Time'];
      for (var i = 0; i < cats.length; i++) {
        var pill = document.getElementById('fcat-' + cats[i]);
        if (!pill) continue;
        var on = (taggingFilterCat === cats[i]);
        pill.style.background = on ? T.blue : T.bgSub;
        pill.style.color      = on ? '#fff' : T.textS;
      }
      var sub = document.getElementById('tagging-sub-row');
      if (!sub) return;
      if (!taggingFilterCat) {
        sub.style.maxHeight = '0';
        sub.style.opacity   = '0';
        setTimeout(function () { sub.style.display = 'none'; }, 200);
        return;
      }
      var subMap = {
        'People': ['VR · You','Mayank','Kavitha','Unknown'],
        'Scene':  ['Bonfire','Forest','Lake','Night','Waterfall','Food','Selfie','Travel','Group'],
        'Format': ['Selfie','Group shot','Landscape','Portrait','Video'],
        'Time':   ['Morning','Afternoon','Evening','Night','Day 1','Day 2']
      };
      var chips = subMap[taggingFilterCat] || [];
      var html  = '<div class="hscroll" style="display:flex;gap:8px;overflow-x:auto;padding:8px 16px;">';
      for (var j = 0; j < chips.length; j++) {
        var sid = 'fsub-' + chips[j].replace(/ /g,'_').replace(/·/g,'');
        html += (
          '<button id="' + sid + '"' +
                  ' onclick="taggingSetFilterSub(\'' + chips[j].replace(/'/g,"\\'") + '\')"' +
                  ' style="white-space:nowrap;height:30px;padding:0 12px;' +
                         'border-radius:20px;border:none;' +
                         'background:' + T.bgSub + ';color:' + T.textS + ';' +
                         'font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;">' +
            chips[j] +
          '</button>'
        );
      }
      html += '</div>';
      sub.innerHTML  = html;
      sub.style.display    = 'block';
      sub.style.transition = 'max-height .2s ease,opacity .2s ease';
      sub.style.maxHeight  = '0';
      sub.style.opacity    = '0';
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          sub.style.maxHeight = '52px';
          sub.style.opacity   = '1';
        });
      });
    }

    function taggingSetFilterSub(sub) {
      taggingFilterSub = (taggingFilterSub === sub) ? '' : sub;
      var row = document.getElementById('tagging-sub-row');
      if (!row) return;
      var btns = row.querySelectorAll('button');
      for (var i = 0; i < btns.length; i++) {
        var on = (btns[i].textContent.trim() === taggingFilterSub);
        btns[i].style.background = on ? T.blueTint : T.bgSub;
        btns[i].style.color      = on ? T.blue     : T.textS;
      }
    }

    /* ─── tab switch ─── */
    function taggingSetTab(tab) {
      taggingTab = tab;
      var tabIds = ['group','saved','downloaded','my-photos'];
      for (var i = 0; i < tabIds.length; i++) {
        var el = document.getElementById('ttab-' + tabIds[i]);
        if (!el) continue;
        var on = (tabIds[i] === tab);
        el.style.color        = on ? T.blue  : T.textS;
        el.style.borderBottom = on ? '2px solid ' + T.blue : '2px solid transparent';
        el.style.fontWeight   = on ? '600' : '400';
      }
      var grid = document.getElementById('tagging-grid');
      if (!grid) return;
      if (tab === 'group') {
        var poolHTML = '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;">';
        var shown = Math.min(groupPoolCount, TRIP_PHOTOS.length);
        for (var j = 0; j < shown; j++) {
          poolHTML += taggingPhotoCell(TRIP_PHOTOS[j]);
        }
        poolHTML += '</div>';
        grid.innerHTML = poolHTML;
      } else {
        var myHTML = '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;">';
        for (var k = 0; k < TRIP_PHOTOS.length; k++) {
          myHTML += taggingPhotoCell(TRIP_PHOTOS[k]);
        }
        myHTML += '</div>';
        grid.innerHTML = myHTML;
      }
    }

    /* ─── three-dot menu ─── */
    function taggingShowThreeDot() {
      var phone = document.getElementById('phone');
      var old   = document.getElementById('tag3dot-overlay');
      if (old) old.remove();
      var items = [
        { label: 'Edit group',        color: T.text,  action: '' },
        { label: 'Share invite link', color: T.text,  action: '' },
        { label: 'Delete group',      color: T.alert, action: '' }
      ];
      var rows = '';
      for (var i = 0; i < items.length; i++) {
        rows += (
          '<div style="padding:14px 20px;' +
                      'border-bottom:0.5px solid ' + T.bgSub + ';' +
                      'font-size:15px;font-weight:400;color:' + items[i].color + ';cursor:pointer;">' +
            items[i].label +
          '</div>'
        );
      }
      var overlay = document.createElement('div');
      overlay.id  = 'tag3dot-overlay';
      overlay.setAttribute('style',
        'position:absolute;inset:0;background:rgba(0,0,0,.12);' +
        'z-index:8000;display:flex;align-items:flex-end;'
      );
      overlay.onclick = function () {
        var s = document.getElementById('tag3dot-sheet');
        if (s) s.style.transform = 'translateY(100%)';
        setTimeout(function () { if (overlay.parentNode) overlay.remove(); }, 260);
      };
      overlay.innerHTML = (
        '<div id="tag3dot-sheet" onclick="event.stopPropagation()"' +
             ' style="width:100%;background:#fff;border-radius:24px 24px 0 0;' +
                    'padding:12px 0 44px;' +
                    'box-shadow:0 -4px 28px rgba(0,0,0,.09);' +
                    'transform:translateY(100%);' +
                    'transition:transform .25s cubic-bezier(0.4,0,0.2,1);">' +
          '<div style="width:36px;height:4px;background:' + T.bgSub + ';' +
                      'border-radius:2px;margin:0 auto 16px;"></div>' +
          rows +
        '</div>'
      );
      phone.appendChild(overlay);
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          var s = document.getElementById('tag3dot-sheet');
          if (s) s.style.transform = 'translateY(0)';
        });
      });
    }

    /* ─────────────────────────────────────────────────────
       CATEGORY PILL FILTER
    ───────────────────────────────────────────────────── */
    var CAT_SCENE_MAP = {
      'Bonfire':   'bonfire',
      'Forest':    'forest',
      'Lake':      'lake',
      'Night':     'night',
      'Waterfall': 'waterfall',
      'Food':      'food',
      'Selfies':   'selfie',
      'Travel':    'travel',
      'Group':     'group'
    };

    function taggingSetCategory(cat) {
      taggingCategory = (taggingCategory === cat) ? '' : cat;
      /* Update pill visuals */
      var allCats = ['Bonfire','Forest','Lake','Night','Waterfall','Food','Selfies','Travel','Group'];
      for (var i = 0; i < allCats.length; i++) {
        var pill = document.getElementById('fcat-' + allCats[i]);
        if (!pill) continue;
        var on = (taggingCategory === allCats[i]);
        pill.style.opacity   = (!taggingCategory || on) ? '1' : '0.45';
        pill.style.transform = on ? 'scale(1.06)' : 'scale(1)';
      }
      /* Filter photos by scene */
      var targetScene = taggingCategory ? (CAT_SCENE_MAP[taggingCategory] || '') : '';
      for (var j = 0; j < TRIP_PHOTOS.length; j++) {
        var ph   = TRIP_PHOTOS[j];
        var cell = document.getElementById('photo-cell-' + ph.id);
        if (!cell) continue;
        cell.style.opacity = (!targetScene || ph.scene === targetScene) ? '1' : '0.12';
      }
    }

        'MA': { count: 9,  bg: 'linear-gradient(135deg,#E65100,#FF8F00)' },

      showIdentifySheet(personId, d.count, d.bg);

    /* ─────────────────────────────────────────────────────
       GROUP SHARE ANIMATION
       Flash selected photos → exit select → switch to Group Pool tab.
    ───────────────────────────────────────────────────── */


    function doShareWithGroup() {
      /* Close share sheet first */
      var shareOv = document.getElementById('tag-share-overlay');
      if (shareOv) {
        var ss = document.getElementById('tag-share-sheet');
        if (ss) ss.style.transform = 'translateY(100%)';
        setTimeout(function () { if (shareOv.parentNode) shareOv.remove(); }, 260);
      }

      var shared = taggingSelected.slice();
      groupPoolCount    = Math.min(groupPoolCount + shared.length, 34);
      groupDisplayCount = groupDisplayCount + shared.length;

      /* Flash each selected photo */
      for (var i = 0; i < shared.length; i++) {
        (function (pid) {
          var cell = document.getElementById('photo-cell-' + pid);
          if (!cell) return;
          cell.style.transition = 'opacity .12s';
          cell.style.opacity    = '0.25';
          setTimeout(function () {
            cell.style.opacity = '1';
            setTimeout(function () {
              cell.style.opacity = '0.25';
              setTimeout(function () { cell.style.opacity = '1'; }, 140);
            }, 140);
          }, 80 + i * 30);
        }(shared[i]));
      }

      setTimeout(function () {
        taggingExitSelect();
        /* Update group pool badge on tab */
        var badge = document.getElementById('ttab-group-badge');
        if (badge) badge.textContent = groupDisplayCount;
        setTimeout(function () {
          taggingSetTab('group');
          showToast(shared.length + ' photo' + (shared.length !== 1 ? 's' : '') + ' shared with the group ✓');
          setTimeout(function () { go('varun-home'); }, 1600);
        }, 350);
      }, shared.length * 30 + 480);
    }

               ' style="' +

    var SCREEN_MAP = {
      'entry':               screenEntry,
      'varun-reg':           screenVarunReg,
      'varun-otp':           screenVarunOtp,
      'varun-profile':       screenVarunProfile,
      'varun-home':          screenVarunHome,
      'varun-create-group':  screenVarunCreateGroup,
      'varun-sync':          screenVarunSync,
      'varun-tagging':       screenVarunTagging,
    };

    /* ─────────────────────────────────────────────────────
       RENDER
       Replaces current .screen with the new screen function's output.
       Never patches innerHTML on a live screen.
    ───────────────────────────────────────────────────── */
    function render() {
      var phone = document.getElementById('phone');
      var old   = phone.querySelector('.screen');
      if (old) old.remove();

      var fn = SCREEN_MAP[state.screen];
      if (!fn) { state.screen = 'entry'; render(); return; }

      var tmp = document.createElement('div');
      tmp.innerHTML = fn();
      var screen = tmp.firstElementChild;
      phone.appendChild(screen);

      postRender();
    }

    /* ─────────────────────────────────────────────────────
       POST-RENDER HOOKS
       Timers and focus calls that must run after DOM insert.
    ───────────────────────────────────────────────────── */
    function postRender() {
      if (state.screen === 'varun-reg') {
        /* Auto-focus phone input */
        setTimeout(function () {
          var inp = document.getElementById('phone-inp');
          if (!inp) return;
          inp.focus();
          var len = inp.value.length;
          try { inp.setSelectionRange(len, len); } catch (e) {}
        }, 150);
      }

      if (state.screen === 'varun-sync') {
        clearInterval(syncPhaseInt);
        syncProg = 0;
        syncDone = false;
      }

      if (state.screen === 'varun-create-group') {
        /* Restore cover photo if user navigated back after setting it */
        if (cgCoverSet) { setTimeout(function() { cgCoverTap(); }, 0); }
        /* Auto-focus group name field */
        setTimeout(function() {
          var inp = document.getElementById('cg-name');
          if (inp) inp.focus();
        }, 150);
      }

      if (state.screen === 'varun-profile') {
        /* Restore avatar if user navigated back after setting it */
        if (avatarSet) {
          setTimeout(function () { setDummyAvatar(); }, 0);
        }
        /* Focus name field */
        setTimeout(function () {
          var inp = document.getElementById('profile-name');
          if (inp) { inp.focus(); inp.select(); }
        }, 150);
      }

      if (state.screen === 'varun-otp') {
        /* Cancel any timers left over from a prior visit */
        clearInterval(otpResendInt);
        clearTimeout(otpExpiryTO);
        /* Reset countdown and start ticking */
        otpSecs = 30;
        otpResendInt = setInterval(otpTick, 1000);
        /* Start inactivity expiry clock */
        otpExpiryTO = setTimeout(otpExpire, 10000);
        /* Focus first box */
        setTimeout(function () {
          var first = document.getElementById('otp-0');
          if (first) first.focus();
        }, 150);
      }

    }

    /* ─────────────────────────────────────────────────────
       BOOT
    ───────────────────────────────────────────────────── */
    render();
  </script>
</body>

        'calendar': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
        'users': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
        'star': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>',
        'log-out': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>',
        'camera': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>',
        'report': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/></svg>',
        'photo-info': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',
      };
      return icons[name] || '<svg width="20" height="20" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>';
    }

    function logo(size=28) {
      return `
        <div style="display:flex;align-items:center;gap:4px;">
          <div style="width:${size}px;height:${size}px;border-radius:6px;background:${T.blue};display:flex;align-items:center;justify-content:center;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="9" cy="9" r="2"/>
              <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>
            </svg>
          </div>
          <span style="font-size:${size-8}px;font-weight:800;color:${T.text};">Pixslay</span>
        </div>`;
    }

    // Shared component functions
    function floatInput(label, id, value='', type='text') {
      const filled = value.length > 0;
      const FLOATED = `top:0;transform:translateY(-50%);font-size:11px;font-weight:600;padding:0 4px;`;
      const RESTING = `top:50%;transform:translateY(-50%);font-size:14px;font-weight:400;padding:0;`;
      const initLblStyle = filled
        ? `position:absolute;left:14px;background:#fff;pointer-events:none;transition:all .15s;${FLOATED}color:${T.textT};`
        : `position:absolute;left:14px;background:#fff;pointer-events:none;transition:all .15s;${RESTING}color:${T.textT};`;
      const initBorder = filled ? `0.5px solid ${T.blueBdr}` : `0.5px solid ${T.bgSub}`;
      return `
        <div style="position:relative;margin-bottom:12px;">
          <input id="${id}" type="${type}" value="${value}"
            style="width:100%;height:52px;border:${initBorder};border-radius:10px;padding:20px 14px 7px;font-family:inherit;font-size:14px;color:${T.text};background:#fff;outline:none;transition:border .15s;"
            onfocus="
              var l=document.getElementById('${id}-lbl');
              if(l) l.style.cssText='position:absolute;left:14px;background:#fff;pointer-events:none;transition:all .15s;${FLOATED}color:${T.blue};';
              this.style.border='1px solid ${T.blue}';"
            onblur="
              var l=document.getElementById('${id}-lbl');
              if(this.value) {
                if(l) l.style.cssText='position:absolute;left:14px;background:#fff;pointer-events:none;transition:all .15s;${FLOATED}color:${T.textT};';
                this.style.border='0.5px solid ${T.blueBdr}';
              } else {
                if(l) l.style.cssText='position:absolute;left:14px;background:#fff;pointer-events:none;transition:all .15s;${RESTING}color:${T.textT};';
                this.style.border='0.5px solid ${T.bgSub}';
              }"
          >
          <label id="${id}-lbl" style="${initLblStyle}">${label}</label>
        </div>`;
    }

    function otpRow(id, dest) {
      const boxes = Array.from({length:6}, (_,i) => `
        <input type="tel" inputmode="numeric" maxlength="1" id="${id}-${i}"
          style="width:40px;height:52px;border:0.5px solid ${T.bgSub};border-radius:10px;background:#fff;font-size:24px;font-weight:800;color:${T.blue};text-align:center;font-family:inherit;outline:none;transition:border .1s, background .1s;"
          onfocus="this.style.border='1.5px solid ${T.blue}'; this.select();"
          onblur="this.style.border=this.value?'0.5px solid ${T.blueBdr}':'0.5px solid ${T.bgSub}';"
          oninput="otpInput('${id}',${i},'${dest}',this)"
          onkeydown="otpBack('${id}',${i},event)"
        />`).join('');
      return `<div style="display:flex;gap:8px;justify-content:center;">${boxes}</div>`;
    }

    function otpInput(id, i, dest, el) {
      el.value = el.value.replace(/[^0-9]/g,'').slice(-1);
      if(el.value) {
        el.style.background = T.blueTint;
        el.style.border = `0.5px solid ${T.blueBdr}`;
        const next = document.getElementById(`${id}-${(i+1)}`);
        if(next) next.focus();
        else setTimeout(()=>go(dest), 300);
      }
    }

    function otpBack(id, i, e) {
      if(e.key==='Backspace') {
        const el = document.getElementById(`${id}-${i}`);
        if(!el.value && i>0) {
          const prev = document.getElementById(`${id}-${(i-1)}`);
          prev.value='';
          prev.style.background='#fff';
          prev.focus();
        }
      }
    }

    function primaryBtn(label, action, disabled=false) {
      const bg = disabled ? T.bgSub : T.blue;
      const color = disabled ? T.textD : '#fff';
      return `<button onclick="${disabled ? '' : action}" style="width:100%;height:50px;border-radius:12px;border:none;background:${bg};color:${color};font-size:15px;font-weight:600;font-family:inherit;outline:none;transition:background .1s;" ${disabled ? 'disabled' : ''}>${label}</button>`;
    }

    function secondaryBtn(label, action) {
      return `<button onclick="${action}" style="width:100%;height:44px;border-radius:12px;border:0.5px solid ${T.blueBdr};background:#fff;color:${T.blue};font-size:13px;font-weight:600;font-family:inherit;outline:none;">${label}</button>`;
    }

    function ghostBtn(label, action) {
      return `<button onclick="${action}" style="width:100%;height:44px;border:none;background:transparent;color:${T.textS};font-size:13px;font-weight:500;font-family:inherit;outline:none;">${label}</button>`;
    }

    function sbar() {
      return `<div style="height:44px;background:#fff;display:flex;align-items:center;padding:0 16px;font-size:13px;font-weight:600;color:${T.text};">9:41</div>`;
    }

    function tbar(backAction, title, rightIcon='', rightAction='') {
      return `
        <div style="height:44px;background:#fff;display:flex;align-items:center;padding:0 16px;border-bottom:0.5px solid ${T.bgSub};">
          <button onclick="${backAction}" style="width:44px;height:44px;border:none;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;">
            ${icon('arrow-left', 20, T.blue)}
          </button>
          <div style="flex:1;text-align:center;font-size:16px;font-weight:700;color:${T.text};">${title}</div>
          ${rightIcon ? `<button onclick="${rightAction}" style="width:44px;height:44px;border:none;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;">${icon(rightIcon, 20, T.text)}</button>` : '<div style="width:44px;"></div>'}
        </div>`;
    }

    function navbar(activeTab, onHome, onProfile, onFab) {
      return `
        <div style="height:56px;background:#fff;border-top:0.5px solid ${T.bgSub};display:flex;align-items:center;padding:0 40px;position:relative;flex-shrink:0;">
          <div onclick="${onHome}" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;">
            ${icon('home', 22, activeTab==='home' ? T.blue : T.textT)}
            <span style="font-size:9px;font-weight:500;color:${activeTab==='home' ? T.blue : T.textT};">Home</span>
          </div>
          <div style="flex:1;"></div>
          <div onclick="${onProfile}" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;">
            ${icon('user', 22, activeTab==='profile' ? T.blue : T.textT)}
            <span style="font-size:9px;font-weight:500;color:${activeTab==='profile' ? T.blue : T.textT};">Profile</span>
          </div>
          <button onclick="${onFab}" style="position:absolute;bottom:28px;left:50%;transform:translateX(-50%);width:52px;height:52px;background:${T.blue};border-radius:50%;border:3px solid #fff;box-shadow:0 4px 12px rgba(27,79,216,.3);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;">
            ${icon('plus', 22, '#fff')}
          </button>
        </div>`;
    }

    function switchPill() {
      return `<button onclick="go('entry')" style="position:absolute;top:6px;left:50%;transform:translateX(-50%);z-index:9999;background:#fff;border:0.5px solid ${T.blue};border-radius:20px;padding:4px 12px;font-family:inherit;font-size:10px;font-weight:500;color:${T.blue};cursor:pointer;white-space:nowrap;">Switch journey</button>`;
    }

    function faceChip(name, count, identified=true, isYou=false) {
      const bg = identified ? T.blue : T.bgSub;
      const color = identified ? '#fff' : T.textS;
      const initials = name.split(' ').map(n => n[0]).join('').toUpperCase();
      const label = isYou ? `${initials} — You` : name;
      return `
        <div style="display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:20px;background:${bg};color:${color};font-size:13px;font-weight:600;min-width:80px;">
          <div style="width:20px;height:20px;border-radius:50%;background:${identified ? '#fff' : T.textD};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:${identified ? T.blue : '#fff'};">${initials}</div>
          <span>${label}</span>
          ${count ? `<span style="font-size:11px;font-weight:500;color:${identified ? '#fff' : T.textT};">${count}</span>` : ''}
        </div>`;
    }

    function faceChipsRow() {
      // Simplified - will be populated based on state
      return `
        <div style="padding:16px 16px 8px;display:flex;gap:8px;overflow-x:auto;">
          ${faceChip('Varun', null, true, true)}
          ${faceChip('?', 14, false)}
          ${faceChip('?', 9, false)}
          ${faceChip('?', 7, false)}
          ${faceChip('?', 6, false)}
        </div>`;
    }

    function filterBar(activeCat, activeSub) {
      const categories = ['People', 'Scene', 'Format', 'Time'];
      const subOptions = {
        People: ['Varun','Beulah','Kavitha','Mayank','Vishal','Anand'],
        Scene:  ['Bonfire','Waterfall','Group shot','Night sky','Forest','Food','Lakeside'],
        Format: ['Selfie','Group','Portrait','Landscape','Video'],
        Time:   ['Day 1 (Sat)','Day 2 (Sun)','Morning','Evening','Night'],
      };
      const subs = activeCat ? subOptions[activeCat] : [];
      return `
        <div style="background:#fff;border-bottom:0.5px solid ${T.bgSub};flex-shrink:0;">
          <div style="display:flex;gap:8px;padding:8px 16px;overflow-x:auto;">
            ${categories.map(cat => `
              <button onclick="filterCatClick('${cat}')" style="height:32px;border-radius:16px;padding:0 14px;border:none;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0;background:${activeCat===cat ? T.blue : T.bgSub};color:${activeCat===cat ? '#fff' : T.textS};">
                ${cat}
              </button>`).join('')}
          </div>
          ${subs.length > 0 ? `
            <div style="display:flex;gap:8px;padding:0 16px 8px;overflow-x:auto;">
              ${subs.map(sub => `
                <button onclick="filterSubClick('${sub}')" style="height:30px;border-radius:15px;padding:0 12px;border:none;font-family:inherit;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0;background:${activeSub===sub ? T.blue : T.bgSub};color:${activeSub===sub ? '#fff' : T.textS};">
                  ${sub}
                </button>`).join('')}
            </div>` : ''}
        </div>`;
    }

    function actionTabs(activeTab) {
      const tabs = ['all', 'shared', 'received', 'saved', 'downloaded'];
      const labels = {all:'All', shared:'Shared', received:'Received', saved:'Saved', downloaded:'Downloaded'};
      return `
        <div style="display:flex;border-bottom:0.5px solid ${T.bgSub};background:#fff;flex-shrink:0;">
          ${tabs.map(tab => `
            <button onclick="actionTabClick('${tab}')" style="flex:1;padding:12px 8px;text-align:center;font-size:13px;font-weight:${activeTab===tab ? 600 : 400};color:${activeTab===tab ? T.text : T.textT};border:none;background:none;border-bottom:${activeTab===tab ? `2px solid ${T.blue}` : 'none'};cursor:pointer;">
              ${labels[tab]}
            </button>`).join('')}
        </div>`;
    }

    function photoIllustration(index) {
      // Simplified placeholder - in real implementation, use actual illustrations
      const colors = ['#2D5A27', '#1B3A6B', '#F5A623', '#0D1B0D', '#D2691E'];
      const bg = colors[index % colors.length];
      return `<div style="width:100%;aspect-ratio:1;background:${bg};border-radius:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;font-weight:800;">${index+1}</div>`;
    }

    function photoCell(index, selected=false, shared=false, saved=false, downloaded=false) {
      const markers = [];
      if (shared) markers.push(`<div style="position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;">${icon('check', 10, T.blue)}</div>`);
      if (saved) markers.push(`<div style="position:absolute;bottom:4px;left:4px;width:8px;height:8px;border-radius:50%;background:${T.ok};"></div>`);
      if (downloaded) markers.push(`<div style="position:absolute;bottom:4px;left:16px;width:8px;height:8px;border-radius:50%;background:${T.blue};"></div>`);
      return `
        <div class="photo-cell" onclick="photoTap(${index})" style="position:relative;aspect-ratio:1;border-radius:0;overflow:hidden;cursor:pointer;${selected ? `border:2px solid ${T.blue};` : ''}">
          ${photoIllustration(index)}
          ${markers.join('')}
        </div>`;
    }

    function photoGrid(photos, columns=3) {
      return `
        <div style="display:grid;grid-template-columns:repeat(${columns},1fr);gap:2px;padding:0 16px;">
          ${photos.map((_, i) => photoCell(i)).join('')}
        </div>`;
    }

    function bottomSheet(id, content) {
      return `
        <div id="${id}-overlay" onclick="closeSheet('${id}')" style="position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;">
          <div onclick="event.stopPropagation()" style="width:100%;background:#fff;border-radius:20px 20px 0 0;padding-bottom:24px;z-index:201;">
            <div style="width:40px;height:4px;background:${T.bgSub};border-radius:2px;margin:8px auto 0;"></div>
            ${content}
          </div>
        </div>`;
    }

    function eventCard(title, dates, members, photos, live=false) {
      return `
        <div style="background:#fff;border-radius:16px;border:0.5px solid ${T.bgSub};padding:16px;margin:0 16px 16px;overflow:hidden;">
          <div style="height:120px;background:#C7D4FB;border-radius:8px;margin-bottom:12px;display:flex;align-items:flex-end;padding:12px;">
            <div style="color:#fff;font-size:16px;font-weight:700;">${title}</div>
            ${live ? `<div style="position:absolute;top:8px;right:8px;width:8px;height:8px;border-radius:50%;background:${T.ok};"></div>` : ''}
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div style="font-size:13px;color:${T.textS};">${dates}</div>
            <div style="display:flex;-webkit-box-align:center;align-items:center;gap:4px;">
              <div style="width:20px;height:20px;border-radius:50%;background:${T.blue};"></div>
              <span style="font-size:11px;color:${T.textT};">${members} members</span>
            </div>
          </div>
          <div style="margin-top:8px;font-size:11px;color:${T.textT};">${photos} photos</div>
        </div>`;
    }

    // Filter functions
    function filterCatClick(cat) {
      state.activeFilters.cat = state.activeFilters.cat === cat ? null : cat;
      state.activeFilters.sub = null;
      render();
    }

    function filterSubClick(sub) {
      state.activeFilters.sub = state.activeFilters.sub === sub ? null : sub;
      render();
      // Apply filter effect
      setTimeout(() => {
        const cells = document.querySelectorAll('.photo-cell');
        cells.forEach((cell, i) => {
          cell.style.opacity = (i % 3 === 0 || i % 5 === 0) ? '1' : '0.2';
          cell.style.transition = 'opacity .3s';
        });
      }, 100);
    }

    function actionTabClick(tab) {
      state.activeFilters.tab = tab;
      render();
    }

    // Photo tap functions
    function photoTap(index) {
      if (state.selectionMode) {
        if (state.selectedPhotos.has(index)) state.selectedPhotos.delete(index);
        else state.selectedPhotos.add(index);
        render();
        return;
      }
      state.currentPhoto = index;
      state.prevScreen = state.screen;
      go('photo-full');
    }

    function enterSelectionMode(index) {
      state.selectionMode = true;
      state.selectedPhotos = new Set([index]);
      render();
    }

    function setupLongPress() {
      document.querySelectorAll('.photo-cell').forEach((cell, i) => {
        let timer;
        const start = () => { timer = setTimeout(() => enterSelectionMode(i), 600); };
        const cancel = () => clearTimeout(timer);
        cell.addEventListener('touchstart', start, { passive: true });
        cell.addEventListener('touchend', cancel);
        cell.addEventListener('touchmove', cancel);
        cell.addEventListener('mousedown', start);
        cell.addEventListener('mouseup', cancel);
        cell.addEventListener('mouseleave', cancel);
      });
    }

    // Sheet functions
    function openSheet(id) {
      const el = document.getElementById(id + '-overlay');
      if (el) el.style.display = 'flex';
    }

    function closeSheet(id) {
      const el = document.getElementById(id + '-overlay');
      if (el) el.style.display = 'none';
    }

    // Screen functions
    function screenEntry() {
      const users = [
        { id: 'varun', name: 'VR — Varun', desc: 'PixSlay user. Creates the group for the Karjat trip.', completed: state.completed.includes('varun') },
        { id: 'beulah', name: 'BE — Beulah', desc: 'New to PixSlay. Discovers it when her photos arrive Sunday morning.', completed: state.completed.includes('beulah') },
        { id: 'kavitha', name: 'KA — Kavitha', desc: 'New to PixSlay. Installs during the trip when Varun shows her.', completed: state.completed.includes('kavitha') },
        { id: 'mayank', name: 'MA — Mayank', desc: 'Existing PixSlay user. Joins the group automatically.', completed: state.completed.includes('mayank') },
        { id: 'vishal', name: 'VI — Vishal', desc: 'New to PixSlay. Takes his time. Joins when Mayank nudges him.', completed: state.completed.includes('vishal') },
      ];

      return `
        <div class="screen" style="position:absolute;inset:0;display:flex;flex-direction:column;background:#F8F7F5;">
          ${switchPill()}
          <div style="flex:1;display:flex;flex-direction:column;">
            <div style="padding:60px 16px 24px;text-align:center;">
              ${logo(28)}
              <div style="margin-top:24px;">
                <div style="background:${T.blueTint};border-radius:20px;padding:4px 12px;display:inline-block;">
                  <span style="font-size:10px;font-weight:600;color:${T.blueDk};">Interactive simulation</span>
                </div>
              </div>
              <h1 style="font-size:22px;font-weight:800;color:${T.text};margin:16px 0 8px;">An overnight trip to Karjat. Five people. Five stories.</h1>
              <p style="font-size:13px;font-weight:400;color:${T.textS};">Pick someone and see PixSlay through their eyes.</p>
            </div>
            <div style="flex:1;padding:0 16px;">
              ${users.map(user => {
                const initials = user.name.split(' — ')[0];
                const fullName = user.name;
                const startScreen = user.id === 'varun' ? 'varun-scene' :
                                   user.id === 'beulah' ? 'beulah-discovery' :
                                   user.id === 'kavitha' ? 'kavitha-intro' :
                                   user.id === 'mayank' ? 'mayank-home' :
                                   user.id === 'vishal' ? 'vishal-nudge' : 'entry';
                return `
                <div onclick="state.journey='${user.id}'; go('${startScreen}')" style="background:#fff;border:0.5px solid ${T.bgSub};border-radius:12px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;cursor:pointer;">
                  <div style="width:40px;height:40px;border-radius:50%;background:${T.blue};display:flex;align-items:center;justify-content:center;">
                    <span style="font-size:12px;font-weight:700;color:#fff;">${initials}</span>
                  </div>
                  <div style="flex:1;">
                    <div style="font-size:14px;font-weight:600;color:${T.text};margin-bottom:2px;">${fullName}</div>

    function startSync() {
      const progress = document.getElementById('sync-progress');
      if (!progress) return;
      let width = 0;
      const interval = setInterval(() => {
        width += 2;
        progress.style.width = width + '%';
        if (width >= 100) {
          clearInterval(interval);
          document.querySelector('button[onclick*="View my photos"]').disabled = false;
          document.querySelector('button[onclick*="View my photos"]').style.background = T.blue;
          document.querySelector('button[onclick*="View my photos"]').style.color = '#fff';
          toast('Sync complete!', 'ok');
        }
      }, 50);
    }

    function startDelivery() {
      const progress = document.getElementById('delivery-progress');
      if (!progress) return;
      let width = 0;
      const interval = setInterval(() => {
        width += 5;
        progress.style.width = width + '%';
        if (width >= 100) {
          clearInterval(interval);
          setTimeout(() => {
            toast('All photos delivered!', 'ok');
            markComplete('varun');
          }, 500);
        }
      }, 100);
    }

    function startInstall(nextScreen) {
      const progress = document.getElementById('install-progress');
      if (!progress) return;
      let width = 0;
      const interval = setInterval(() => {
        width += 3;
        progress.style.width = width + '%';
        if (width >= 100) {
          clearInterval(interval);
          setTimeout(() => {
            go(nextScreen);
          }, 500);
        }
      }, 30);
    }

    // Render function
    function render() {
      const phone = document.getElementById('phone');
      const old = phone.querySelector('.screen');
      if (old) old.remove();
      const fn = SCREEN_MAP[state.screen];
      if (!fn) { state.screen = 'entry'; render(); return; }
      const tmp = document.createElement('div');
      tmp.innerHTML = fn();
      const screen = tmp.firstElementChild;
      phone.appendChild(screen);
      postRender();
    }

    // Post-render function

      // Setup long press for photo cells if they exist

      // Focus first OTP box if exists

      }
    }
