<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PixSlay Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* Desktop — phone frame centered on warm background */
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #E8E4DF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
      margin: 0;
    }
    .phone {
      width: 390px;
      height: 844px;
      background: #F8F7F5;
      border-radius: 50px;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
      box-shadow: 0 0 0 8px #2E2A26, 0 0 0 10px #1A1610, 0 32px 64px rgba(0,0,0,.35);
    }

    /* Mobile — fills the real screen edge to edge like a native app */
    @media (max-width: 500px) {
      body {
        padding: 0;
        background: #F8F7F5;
        align-items: flex-start;
        overflow: hidden;
      }
      .phone {
        width: 100vw;
        height: 100svh;  /* svh = small viewport height, excludes browser chrome */
        border-radius: 0;
        box-shadow: none;
      }
      .notch { display: none; }
    }

    /* Fallback for browsers that don't support svh */
    @supports not (height: 100svh) {
      @media (max-width: 500px) {
        .phone { height: 100vh; }
      }
    }
  </style>
</head>
<body>
  <div id="phone" class="phone">
    <!-- Screens will be inserted here -->
  </div>
  <script>
    // Design tokens
    const T = {
      blue:    '#1B4FD8',
      blueH:   '#2960F5',
      blueTint:'#EEF2FD',
      blueBdr: '#C7D4FB',
      blueDk:  '#0C447C',
      blueDp:  '#185FA5',
      white:   '#FFFFFF',
      bgWarm:  '#F8F7F5',
      bgSub:   '#F0EEEB',
      text:    '#1A1917',
      textS:   '#6B6864',
      textT:   '#A8A49F',
      textD:   '#D4D1CC',
      ok:      '#0F9E6E',
      alert:   '#E8490F',
      amber:   '#F5A623',
    };

    // State management
    const state = {
      screen:     'entry',
      journey:    null,
      completed:  [],
      identifiedFaces: [],      // [{index: 0-4, name: 'Beulah'}]
      selectionMode:   false,
      selectedPhotos:  new Set(),
      sharedPhotos:    new Set(),
      savedPhotos:     new Set(),
      activeFilters: {
        mainTab: 'my',          // 'my' | 'with'
        cat:     null,          // 'People' | 'Scene' | 'Format' | 'Time'
        sub:     null,          // active sub-filter string
        tab:     'all',         // 'all' | 'shared' | 'received' | 'saved' | 'downloaded'
      },
      currentPhoto: 0,
      prevScreen:   null,
    };

    function go(screenName) {
      state.screen = screenName;
      render();
    }

    function markComplete(journey) {
      if (!state.completed.includes(journey)) state.completed.push(journey);
      // Reset journey-specific state
      state.identifiedFaces  = [];
      state.selectedPhotos   = new Set();
      state.sharedPhotos     = new Set();
      state.savedPhotos      = new Set();
      state.selectionMode    = false;
      state.activeFilters    = { mainTab:'my', cat:null, sub:null, tab:'all' };
      go('entry');
    }

    // Utility functions
    function toast(message, type='ok') {
      const bg = type === 'ok' ? T.ok : T.alert;
      const iconName = type === 'ok' ? 'check' : 'alert-circle';
      const el = document.createElement('div');
      el.innerHTML = `
        <div style="position:fixed;top:16px;left:50%;transform:translateX(-50%);
                    z-index:10000;background:${bg};color:#fff;border-radius:12px;
                    padding:12px 16px;font-size:13px;font-weight:600;display:flex;
                    align-items:center;gap:8px;min-width:200px;justify-content:center;
                    box-shadow:0 4px 12px rgba(0,0,0,.15);">
          ${icon(iconName, 16, '#fff')}
          ${message}
        </div>`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    function popup(headline, copy, leftBtn, rightBtn) {
      const id = 'popup-' + Date.now();
      const el = document.createElement('div');
      el.innerHTML = `
        <div id="${id}-overlay" onclick="closeSheet('${id}')"
          style="position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;
                 display:flex;align-items:center;justify-content:center;">
          <div onclick="event.stopPropagation()"
            style="width:280px;background:#fff;border-radius:16px;padding:24px;
                   display:flex;flex-direction:column;gap:8px;">
            <div style="font-size:18px;font-weight:800;color:${T.text};text-align:center;">
              ${headline}
            </div>
            <div style="font-size:13px;font-weight:400;color:${T.textS};text-align:center;">
              ${copy}
            </div>
            <div style="display:flex;gap:8px;margin-top:20px;">
              <button onclick="${leftBtn.action}; closeSheet('${id}');"
                style="flex:1;height:44px;border-radius:10px;border:0.5px solid ${T.alert};
                       background:#fff;color:${T.alert};font-size:13px;font-weight:600;">
                ${leftBtn.label}
              </button>
              <button onclick="${rightBtn.action}; closeSheet('${id}');"
                style="flex:1;height:44px;border-radius:10px;border:none;
                       background:${T.blue};color:#fff;font-size:13px;font-weight:600;">
                ${rightBtn.label}
              </button>
            </div>
          </div>
        </div>`;
      document.body.appendChild(el);
    }

    function icon(name, size=20, color=T.text) {
      // Simplified icon function - in real implementation, use actual SVG paths
      const icons = {
        'home': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>',
        'user': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
        'plus': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
        'arrow-left': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/></svg>',
        'chevron-right': '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9 18 15 12 9 6"/></svg>',
        'search': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
        'more-horizontal': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>',
        'check': '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20,6 9,17 4,12"/></svg>',
        'alert-circle': '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
        'share-2': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.59 13.51 6.83 3.98"/><path d="m15.41 6.51-6.82 3.98"/></svg>',
        'download': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
        'bookmark': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>',
        'trash-2': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="3,6 5,6 21,6"/><path d="M19,6v14a2,2 0 0,1-2,2H7a2,2 0 0,1-2-2V6m3,0V4a2,2 0 0,1,2-2h4a2,2 0 0,1,2,2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>',
        'image': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>',
        'bell': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>',
        'calendar': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
        'users': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
        'star': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>',
        'log-out': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>',
        'camera': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>',
        'report': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/></svg>',
        'photo-info': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',
      };
      return icons[name] || '<svg width="20" height="20" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>';
    }

    function logo(size=28) {
      return `
        <div style="display:flex;align-items:center;gap:4px;">
          <div style="width:${size}px;height:${size}px;border-radius:6px;background:${T.blue};display:flex;align-items:center;justify-content:center;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="9" cy="9" r="2"/>
              <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>
            </svg>
          </div>
          <span style="font-size:${size-8}px;font-weight:800;color:${T.text};">Pixslay</span>
        </div>`;
    }

    // Shared component functions
    function floatInput(label, id, value='', type='text') {
      const filled = value.length > 0;
      const FLOATED = `top:0;transform:translateY(-50%);font-size:11px;font-weight:600;padding:0 4px;`;
      const RESTING = `top:50%;transform:translateY(-50%);font-size:14px;font-weight:400;padding:0;`;
      const initLblStyle = filled
        ? `position:absolute;left:14px;background:#fff;pointer-events:none;transition:all .15s;${FLOATED}color:${T.textT};`
        : `position:absolute;left:14px;background:#fff;pointer-events:none;transition:all .15s;${RESTING}color:${T.textT};`;
      const initBorder = filled ? `0.5px solid ${T.blueBdr}` : `0.5px solid ${T.bgSub}`;
      return `
        <div style="position:relative;margin-bottom:12px;">
          <input id="${id}" type="${type}" value="${value}"
            style="width:100%;height:52px;border:${initBorder};border-radius:10px;padding:20px 14px 7px;font-family:inherit;font-size:14px;color:${T.text};background:#fff;outline:none;transition:border .15s;"
            onfocus="
              var l=document.getElementById('${id}-lbl');
              if(l) l.style.cssText='position:absolute;left:14px;background:#fff;pointer-events:none;transition:all .15s;${FLOATED}color:${T.blue};';
              this.style.border='1px solid ${T.blue}';"
            onblur="
              var l=document.getElementById('${id}-lbl');
              if(this.value) {
                if(l) l.style.cssText='position:absolute;left:14px;background:#fff;pointer-events:none;transition:all .15s;${FLOATED}color:${T.textT};';
                this.style.border='0.5px solid ${T.blueBdr}';
              } else {
                if(l) l.style.cssText='position:absolute;left:14px;background:#fff;pointer-events:none;transition:all .15s;${RESTING}color:${T.textT};';
                this.style.border='0.5px solid ${T.bgSub}';
              }"
          >
          <label id="${id}-lbl" style="${initLblStyle}">${label}</label>
        </div>`;
    }

    function otpRow(id, dest) {
      const boxes = Array.from({length:6}, (_,i) => `
        <input type="tel" inputmode="numeric" maxlength="1" id="${id}-${i}"
          style="width:40px;height:52px;border:0.5px solid ${T.bgSub};border-radius:10px;background:#fff;font-size:24px;font-weight:800;color:${T.blue};text-align:center;font-family:inherit;outline:none;transition:border .1s, background .1s;"
          onfocus="this.style.border='1.5px solid ${T.blue}'; this.select();"
          onblur="this.style.border=this.value?'0.5px solid ${T.blueBdr}':'0.5px solid ${T.bgSub}';"
          oninput="otpInput('${id}',${i},'${dest}',this)"
          onkeydown="otpBack('${id}',${i},event)"
        />`).join('');
      return `<div style="display:flex;gap:8px;justify-content:center;">${boxes}</div>`;
    }

    function otpInput(id, i, dest, el) {
      el.value = el.value.replace(/[^0-9]/g,'').slice(-1);
      if(el.value) {
        el.style.background = T.blueTint;
        el.style.border = `0.5px solid ${T.blueBdr}`;
        const next = document.getElementById(`${id}-${(i+1)}`);
        if(next) next.focus();
        else setTimeout(()=>go(dest), 300);
      }
    }

    function otpBack(id, i, e) {
      if(e.key==='Backspace') {
        const el = document.getElementById(`${id}-${i}`);
        if(!el.value && i>0) {
          const prev = document.getElementById(`${id}-${(i-1)}`);
          prev.value='';
          prev.style.background='#fff';
          prev.focus();
        }
      }
    }

    function primaryBtn(label, action, disabled=false) {
      const bg = disabled ? T.bgSub : T.blue;
      const color = disabled ? T.textD : '#fff';
      return `<button onclick="${disabled ? '' : action}" style="width:100%;height:50px;border-radius:12px;border:none;background:${bg};color:${color};font-size:15px;font-weight:600;font-family:inherit;outline:none;transition:background .1s;" ${disabled ? 'disabled' : ''}>${label}</button>`;
    }

    function secondaryBtn(label, action) {
      return `<button onclick="${action}" style="width:100%;height:44px;border-radius:12px;border:0.5px solid ${T.blueBdr};background:#fff;color:${T.blue};font-size:13px;font-weight:600;font-family:inherit;outline:none;">${label}</button>`;
    }

    function ghostBtn(label, action) {
      return `<button onclick="${action}" style="width:100%;height:44px;border:none;background:transparent;color:${T.textS};font-size:13px;font-weight:500;font-family:inherit;outline:none;">${label}</button>`;
    }

    function sbar() {
      return `<div style="height:44px;background:#fff;display:flex;align-items:center;padding:0 16px;font-size:13px;font-weight:600;color:${T.text};">9:41</div>`;
    }

    function tbar(backAction, title, rightIcon='', rightAction='') {
      return `
        <div style="height:44px;background:#fff;display:flex;align-items:center;padding:0 16px;border-bottom:0.5px solid ${T.bgSub};">
          <button onclick="${backAction}" style="width:44px;height:44px;border:none;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;">
            ${icon('arrow-left', 20, T.blue)}
          </button>
          <div style="flex:1;text-align:center;font-size:16px;font-weight:700;color:${T.text};">${title}</div>
          ${rightIcon ? `<button onclick="${rightAction}" style="width:44px;height:44px;border:none;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;">${icon(rightIcon, 20, T.text)}</button>` : '<div style="width:44px;"></div>'}
        </div>`;
    }

    function navbar(activeTab, onHome, onProfile, onFab) {
      return `
        <div style="height:56px;background:#fff;border-top:0.5px solid ${T.bgSub};display:flex;align-items:center;padding:0 40px;position:relative;flex-shrink:0;">
          <div onclick="${onHome}" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;">
            ${icon('home', 22, activeTab==='home' ? T.blue : T.textT)}
            <span style="font-size:9px;font-weight:500;color:${activeTab==='home' ? T.blue : T.textT};">Home</span>
          </div>
          <div style="flex:1;"></div>
          <div onclick="${onProfile}" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;">
            ${icon('user', 22, activeTab==='profile' ? T.blue : T.textT)}
            <span style="font-size:9px;font-weight:500;color:${activeTab==='profile' ? T.blue : T.textT};">Profile</span>
          </div>
          <button onclick="${onFab}" style="position:absolute;bottom:28px;left:50%;transform:translateX(-50%);width:52px;height:52px;background:${T.blue};border-radius:50%;border:3px solid #fff;box-shadow:0 4px 12px rgba(27,79,216,.3);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;">
            ${icon('plus', 22, '#fff')}
          </button>
        </div>`;
    }

    function switchPill() {
      return `<button onclick="go('entry')" style="position:absolute;top:6px;left:50%;transform:translateX(-50%);z-index:9999;background:#fff;border:0.5px solid ${T.blue};border-radius:20px;padding:4px 12px;font-family:inherit;font-size:10px;font-weight:500;color:${T.blue};cursor:pointer;white-space:nowrap;">Switch journey</button>`;
    }

    function faceChip(name, count, identified=true, isYou=false) {
      const bg = identified ? T.blue : T.bgSub;
      const color = identified ? '#fff' : T.textS;
      const initials = name.split(' ').map(n => n[0]).join('').toUpperCase();
      const label = isYou ? `${initials} — You` : name;
      return `
        <div style="display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:20px;background:${bg};color:${color};font-size:13px;font-weight:600;min-width:80px;">
          <div style="width:20px;height:20px;border-radius:50%;background:${identified ? '#fff' : T.textD};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:${identified ? T.blue : '#fff'};">${initials}</div>
          <span>${label}</span>
          ${count ? `<span style="font-size:11px;font-weight:500;color:${identified ? '#fff' : T.textT};">${count}</span>` : ''}
        </div>`;
    }

    function faceChipsRow() {
      // Simplified - will be populated based on state
      return `
        <div style="padding:16px 16px 8px;display:flex;gap:8px;overflow-x:auto;">
          ${faceChip('Varun', null, true, true)}
          ${faceChip('?', 14, false)}
          ${faceChip('?', 9, false)}
          ${faceChip('?', 7, false)}
          ${faceChip('?', 6, false)}
        </div>`;
    }

    function filterBar(activeCat, activeSub) {
      const categories = ['People', 'Scene', 'Format', 'Time'];
      const subOptions = {
        People: ['Varun','Beulah','Kavitha','Mayank','Vishal','Anand'],
        Scene:  ['Bonfire','Waterfall','Group shot','Night sky','Forest','Food','Lakeside'],
        Format: ['Selfie','Group','Portrait','Landscape','Video'],
        Time:   ['Day 1 (Sat)','Day 2 (Sun)','Morning','Evening','Night'],
      };
      const subs = activeCat ? subOptions[activeCat] : [];
      return `
        <div style="background:#fff;border-bottom:0.5px solid ${T.bgSub};flex-shrink:0;">
          <div style="display:flex;gap:8px;padding:8px 16px;overflow-x:auto;">
            ${categories.map(cat => `
              <button onclick="filterCatClick('${cat}')" style="height:32px;border-radius:16px;padding:0 14px;border:none;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0;background:${activeCat===cat ? T.blue : T.bgSub};color:${activeCat===cat ? '#fff' : T.textS};">
                ${cat}
              </button>`).join('')}

      return `<div style="width:100%;aspect-ratio:1;background:${bg};border-radius:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;font-weight:800;">${index+1}</div>`;

    function photoCell(index, selected=false, shared=false, saved=false, downloaded=false) {

      return `

    function filterSubClick(sub) {
      state.activeFilters.sub = state.activeFilters.sub === sub ? null : sub;

      // Apply filter effect
      setTimeout(() => {
        const cells = document.querySelectorAll('.photo-cell');
        cells.forEach((cell, i) => {
          cell.style.opacity = (i % 3 === 0 || i % 5 === 0) ? '1' : '0.2';
          cell.style.transition = 'opacity .3s';
        });
      }, 100);

    function actionTabClick(tab) {
      state.activeFilters.tab = tab;

    // Photo tap functions
    function photoTap(index) {
      if (state.selectionMode) {
        if (state.selectedPhotos.has(index)) state.selectedPhotos.delete(index);
        else state.selectedPhotos.add(index);
        render();
        return;
      }
      state.currentPhoto = index;
      state.prevScreen = state.screen;
      go('photo-full');

    function enterSelectionMode(index) {
      state.selectionMode = true;

    function setupLongPress() {
      document.querySelectorAll('.photo-cell').forEach((cell, i) => {
        let timer;
        const start = () => { timer = setTimeout(() => enterSelectionMode(i), 600); };
        const cancel = () => clearTimeout(timer);
        cell.addEventListener('touchstart', start, { passive: true });
        cell.addEventListener('touchend', cancel);
        cell.addEventListener('touchmove', cancel);
        cell.addEventListener('mousedown', start);
        cell.addEventListener('mouseup', cancel);
        cell.addEventListener('mouseleave', cancel);
      });

    function startSync() {
      const progress = document.getElementById('sync-progress');
      if (!progress) return;
      let width = 0;
      const interval = setInterval(() => {
        width += 2;
        progress.style.width = width + '%';
        if (width >= 100) {
          clearInterval(interval);
          document.querySelector('button[onclick*="View my photos"]').disabled = false;
          document.querySelector('button[onclick*="View my photos"]').style.background = T.blue;
          document.querySelector('button[onclick*="View my photos"]').style.color = '#fff';
          toast('Sync complete!', 'ok');
        }
      }, 50);
    }

    function startDelivery() {
      const progress = document.getElementById('delivery-progress');
      if (!progress) return;
      let width = 0;
      const interval = setInterval(() => {
        width += 5;
        progress.style.width = width + '%';
        if (width >= 100) {
          clearInterval(interval);
          setTimeout(() => {
            toast('All photos delivered!', 'ok');
            markComplete('varun');
          }, 500);
        }
      }, 100);
    }

              <div style="width:72px;height:72px;border-radius:50%;background:${T.blueTint};border:1.5px dashed ${T.blueBdr};display:flex;align-items:center;justify-content:center;margin:0 auto 12px;cursor:pointer;">
                ${icon('user', 24, T.blueBdr)}
              </div>
              <p style="font-size:11px;font-weight:400;color:${T.textT};">Add a photo so friends recognise you</p>
            </div>
            <div style="padding:0 16px;">
              ${floatInput('Full name', 'name', 'Vishal')}
              ${floatInput('Email (optional)', 'email', '', 'email')}
            </div>
            <div style="flex:1;"></div>
            <div style="padding:0 16px 24px;">
              ${primaryBtn('Continue', "go('vishal-home')")}
            </div>
          </div>
        </div>`;
    }

    function screenVishalHome() {
      return `
        <div class="screen" style="position:absolute;inset:0;display:flex;flex-direction:column;background:#F8F7F5;">
          ${switchPill()}
          <div style="flex:1;display:flex;flex-direction:column;">
            ${tbar("go('entry')", logo(16).replace('gap:4px', 'gap:2px').replace('28px', '16px').replace('22px', '16px'), 'bell', "openSheet('notifications')")}
            <div style="padding:16px;">
              <div style="background:#fff;border:0.5px solid ${T.bgSub};border-radius:12px;padding:16px;margin-bottom:16px;display:flex;gap:12px;">
                <div style="width:40px;height:40px;border-radius:50%;background:${T.blue};display:flex;align-items:center;justify-content:center;">
                  <span style="font-size:12px;font-weight:700;color:#fff;">MA</span>
                </div>
                <div style="flex:1;">
                  <div style="font-size:14px;font-weight:600;color:${T.text};margin-bottom:4px;">Mayank invited you to join</div>
                  <div style="font-size:13px;font-weight:400;color:${T.textS};margin-bottom:8px;">Mumbai — Karjat</div>
                  <div style="font-size:11px;font-weight:400;color:${T.textT};">Sat 24 May — Sun 25 May • 6 members</div>
                </div>
                <div style="width:16px;height:16px;display:flex;align-items:center;justify-content:center;">
                  ${icon('chevron-right', 16, T.textT)}
                </div>
              </div>
              ${eventCard('Office Party', 'Last month', 8, 45, false)}
            </div>
          </div>
          ${navbar('home', "go('vishal-home')", "go('vishal-onboard')", "go('vishal-event')")}
          ${bottomSheet('notifications', `
            <div style="padding:16px;">
              <div style="padding:12px;border-bottom:0.5px solid ${T.bgSub};display:flex;gap:12px;">
                <div style="width:32px;height:32px;border-radius:50%;background:${T.blue};display:flex;align-items:center;justify-content:center;">
                  <span style="font-size:10px;font-weight:700;color:#fff;">MA</span>
                </div>
                <div style="flex:1;">
                  <p style="font-size:13px;font-weight:500;color:${T.text};">Mayank invited you to Mumbai — Karjat</p>
                  <p style="font-size:11px;font-weight:400;color:${T.textT};">1h ago</p>
                </div>
              </div>
            </div>
          `)}
        </div>`;
    }

    function screenVishalEvent() {
      const photos = Array.from({length:16}, (_,i) => i);
      return `
        <div class="screen" style="position:absolute;inset:0;display:flex;flex-direction:column;background:#F8F7F5;">
          ${switchPill()}
          <div style="flex:1;display:flex;flex-direction:column;">
            ${tbar("go('vishal-home')", 'Mumbai — Karjat', 'search', '')}
            ${faceChipsRow()}
            <div style="display:flex;border-bottom:0.5px solid ${T.bgSub};background:#fff;flex-shrink:0;">
              <button onclick="state.activeFilters.mainTab='my'; render()" style="flex:1;padding:12px;text-align:center;font-size:13px;font-weight:${state.activeFilters.mainTab==='my' ? 600 : 400};color:${state.activeFilters.mainTab==='my' ? T.text : T.textT};border:none;background:none;border-bottom:${state.activeFilters.mainTab==='my' ? `2px solid ${T.blue}` : 'none'};cursor:pointer;">My Photos</button>
              <button onclick="state.activeFilters.mainTab='with'; render()" style="flex:1;padding:12px;text-align:center;font-size:13px;font-weight:${state.activeFilters.mainTab==='with' ? 600 : 400};color:${state.activeFilters.mainTab==='with' ? T.text : T.textT};border:none;background:none;border-bottom:${state.activeFilters.mainTab==='with' ? `2px solid ${T.blue}` : 'none'};cursor:pointer;">With Me</button>
            </div>
            ${filterBar(state.activeFilters.cat, state.activeFilters.sub)}
            ${actionTabs(state.activeFilters.tab)}
            <div style="flex:1;overflow-y:auto;">
              ${photoGrid(photos)}
            </div>
          </div>
          ${navbar('home', "go('vishal-home')", "go('vishal-onboard')", "go('vishal-event')")}
        </div>`;
    }

    function startInstall(nextScreen) {
      const progress = document.getElementById('install-progress');
      if (!progress) return;
      let width = 0;
      const interval = setInterval(() => {
        width += 3;
        progress.style.width = width + '%';
        if (width >= 100) {
          clearInterval(interval);
          setTimeout(() => {
            go(nextScreen);
          }, 500);
        }
      }, 30);
    }

    // SCREEN_MAP
    const SCREEN_MAP = {
      'entry': () => screenEntry(),
      'varun-scene': () => screenVarunScene(),
      'varun-reg': () => screenVarunReg(),
      'varun-otp': () => screenVarunOtp(),
      'varun-profile': () => screenVarunProfile(),
      'varun-home-empty': () => screenVarunHomeEmpty(),
      'varun-create-group': () => screenVarunCreateGroup(),
      'varun-sync': () => screenVarunSync(),
      'varun-home': () => screenVarunHome(),
      'varun-event': () => screenVarunEvent(),
      'photo-full': () => screenPhotoFull(),
      'varun-delivery': () => screenVarunDelivery(),
      'beulah-discovery': () => screenBeulahDiscovery(),
      'beulah-install': () => screenBeulahInstall(),
      'beulah-onboard': () => screenBeulahOnboard(),
      'beulah-home': () => screenBeulahHome(),
      'beulah-event': () => screenBeulahEvent(),
      'kavitha-intro': () => screenKavithaIntro(),
      'kavitha-install': () => screenKavithaInstall(),
      'kavitha-onboard': () => screenKavithaOnboard(),
      'kavitha-home': () => screenKavithaHome(),
      'kavitha-event': () => screenKavithaEvent(),
      'mayank-home': () => screenMayankHome(),
      'mayank-join': () => screenMayankJoin(),
      'mayank-event': () => screenMayankEvent(),
      'vishal-nudge': () => screenVishalNudge(),
      'vishal-install': () => screenVishalInstall(),
      'vishal-onboard': () => screenVishalOnboard(),
      'vishal-home': () => screenVishalHome(),
      'vishal-event': () => screenVishalEvent(),
    };

    // Render function
    function render() {
      const phone = document.getElementById('phone');
      const old = phone.querySelector('.screen');
      if (old) old.remove();
      const fn = SCREEN_MAP[state.screen];
      if (!fn) { state.screen = 'entry'; render(); return; }
      const tmp = document.createElement('div');
      tmp.innerHTML = fn();
      const screen = tmp.firstElementChild;
      phone.appendChild(screen);
      postRender();
    }

    // Post-render function
    function postRender() {
      // Setup long press for photo cells if they exist
      if (document.querySelector('.photo-cell')) {
        setupLongPress();
      }
      // Focus first OTP box if exists
      const firstOtp = document.getElementById('otp-0');
      if (firstOtp) {
        setTimeout(() => firstOtp.focus(), 150);
      }
    }

    // Initial render
    render();
  </script>
</body>
</html>
