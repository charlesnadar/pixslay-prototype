    /* ── Helper: past album list card (filterable) ── */
    function alListCard(album) {
      if (albumSelectedPerson) {
        var has = false;
        for (var i = 0; i < album.people.length; i++) { if (album.people[i] === albumSelectedPerson) { has = true; break; } }
        if (!has) return '';
      }
      if (albumSearchQuery) {
        var q = albumSearchQuery.toLowerCase();
        var hit = album.title.toLowerCase().indexOf(q) >= 0;
        if (!hit) {
          outer: for (var k = 0; k < album.people.length; k++) {
            for (var m = 0; m < AL_PEOPLE.length; m++) {
              if (AL_PEOPLE[m].id === album.people[k] && AL_PEOPLE[m].name.toLowerCase().indexOf(q) >= 0) { hit = true; break outer; }
            }
          }
        }
        if (!hit) return '';
      }
      return (
        '<div onclick="hasSynced=true;taggingOpenTab=\'group\';go(\'varun-tagging\')" style="display:flex;align-items:center;gap:12px;background:#fff;border-radius:14px;padding:10px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.06);cursor:pointer;">' +
          '<div style="width:64px;height:64px;border-radius:10px;overflow:hidden;flex-shrink:0;">' +
            '<img src="' + PHOTO_FILES[album.coverIdx] + '" style="width:100%;height:100%;object-fit:cover;display:block;">' +
          '</div>' +
          '<div style="flex:1;min-width:0;">' +
            '<p style="font-size:14px;font-weight:700;color:' + T.text + ';margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + album.title + '</p>' +
            '<p style="font-size:11px;color:' + T.textS + ';margin-bottom:6px;">' + album.dates + ' · ' + album.meta + '</p>' +
            alFaceStack(album.people) +
          '</div>' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="' + T.textT + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>' +
        '</div>'
      );
    }

    /* ── Helper: labelled section (Recent Trips / Memories) ── */
    function alSection(label, albums) {
      if (!albums || !albums.length) return '';
      var cards = '';
      for (var i = 0; i < albums.length; i++) cards += alListCard(albums[i]);
      if (!cards) return '';
      /* Map label to section key so See All knows which list to open */
      var sectionKey = label === 'Memories' ? 'memories' : 'recent';
      return (
        '<div style="margin-bottom:8px;">' +
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">' +
            '<p style="font-size:13px;font-weight:700;color:' + T.text + ';">' + label + '</p>' +
            '<button onclick="seeAllSection=\'' + sectionKey + '\';go(\'album-see-all\')"' +
                    ' style="font-size:12px;font-weight:600;color:' + T.blue + ';background:none;border:none;cursor:pointer;padding:0;">See all</button>' +
          '</div>' +
          cards +
        '</div>'
      );
    }

    /* ── Helper: people chips — show 4 + "+X" chip, tap reveals rest inline ── */
    var AL_PEOPLE_SHOW = 4;   /* visible before expand */

    function alPeopleChips() {
      var allOn   = !albumSelectedPerson;
      var limit   = albumPeopleExpanded ? AL_PEOPLE.length : Math.min(AL_PEOPLE_SHOW, AL_PEOPLE.length);
      var hasMore = !albumPeopleExpanded && AL_PEOPLE.length > AL_PEOPLE_SHOW;
      var chips   = '';

      /* All button */
      chips += '<button onclick="alSetPersonFilter(\'\')" style="display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;flex-shrink:0;">' +
                 '<div style="width:44px;height:44px;border-radius:50%;background:' + (allOn ? T.blue : T.bgSub) + ';display:flex;align-items:center;justify-content:center;">' +
                   '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="' + (allOn ? '#fff' : T.textT) + '" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>' +
                 '</div>' +
                 '<span style="font-size:10px;font-weight:600;color:' + (allOn ? T.blue : T.textS) + ';">All</span>' +
               '</button>';

      /* People chips — first N or all */
      for (var i = 0; i < limit; i++) {
        var p   = AL_PEOPLE[i];
        var on  = (albumSelectedPerson === p.id);
        /* Newly revealed chips (index >= AL_PEOPLE_SHOW) get the slide-in animation */
        var anim = (albumPeopleExpanded && i >= AL_PEOPLE_SHOW)
          ? 'animation:pplReveal .22s ease both;animation-delay:' + ((i - AL_PEOPLE_SHOW) * 40) + 'ms;'
          : '';
        chips += '<button onclick="alSetPersonFilter(\'' + p.id + '\')"' +
                        ' style="display:flex;flex-direction:column;align-items:center;gap:3px;' +
                               'background:none;border:none;cursor:pointer;flex-shrink:0;' + anim + '">' +
                   '<div style="width:44px;height:44px;border-radius:50%;background:' + p.bg + ';' +
                               'box-sizing:border-box;border:2.5px solid ' + (on ? T.blue : 'transparent') + ';' +
                               'display:flex;align-items:center;justify-content:center;">' +
                     '<span style="font-size:13px;font-weight:800;color:#fff;">' + p.id + '</span>' +
                   '</div>' +
                   '<span style="font-size:10px;font-weight:600;color:' + (on ? T.blue : T.textS) + ';">' + p.name + ' (' + p.count + ')</span>' +
                 '</button>';
      }

      /* "+X more" chip */
      if (hasMore) {
        var remaining = AL_PEOPLE.length - AL_PEOPLE_SHOW;
        chips += '<button onclick="alTogglePeopleExpanded()"' +
                        ' style="display:flex;flex-direction:column;align-items:center;gap:3px;' +
                               'background:none;border:none;cursor:pointer;flex-shrink:0;">' +
                   '<div style="width:44px;height:44px;border-radius:50%;background:' + T.bgSub + ';' +
                               'display:flex;align-items:center;justify-content:center;">' +
                     '<span style="font-size:12px;font-weight:700;color:' + T.textS + ';">+' + remaining + '</span>' +
                   '</div>' +
                   '<span style="font-size:10px;font-weight:600;color:' + T.textS + ';">More</span>' +
                 '</button>';
      }

      return (
        '<div class="hscroll" style="display:flex;gap:10px;overflow-x:auto;padding:12px 16px 4px;">' +
          chips +
          '<div style="width:32px;flex-shrink:0;"></div>' +
        '</div>' +
        /* Fade only while there are hidden chips */
        (hasMore
          ? '<div style="position:absolute;top:0;right:0;height:100%;width:52px;' +
                        'background:linear-gradient(to left,' + T.bgWarm + ' 20%,transparent 100%);' +
                        'pointer-events:none;"></div>'
          : '')
      );
    }

    /* One-way expand — reveals remaining chips inline with animation */
    function alTogglePeopleExpanded() {

    /* ── Filter helpers ── */
    function setAlbumFilter(key, val) {
      if      (key === 'date')      albumFilterDate      = (albumFilterDate      === val) ? '' : val;

      else if (key === 'sort')      albumFilterSort      = val;
      showAlbumFilterSheet();
    }

    function showAlbumFilterSheet() {
      var old = document.getElementById('al-filter-ov');
      if (old) old.remove();

      function fChip(key, val, label) {
        var on = (key === 'date' && albumFilterDate === val) ||
                 (key === 'ownership' && albumFilterOwnership === val) ||

            '<div style="width:36px;height:4px;border-radius:2px;background:' + T.bgSub + ';"></div>' +

          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">' +
            '<p style="font-size:16px;font-weight:700;color:' + T.text + ';">Filters</p>' +
            '<button onclick="albumFilterDate=\'\';albumFilterOwnership=\'\';albumFilterSort=\'last-updated\';showAlbumFilterSheet()" style="font-size:13px;font-weight:600;color:' + T.blue + ';background:none;border:none;cursor:pointer;">Reset</button>' +

            fChip('date','weekend','This Weekend') +
            fChip('date','month','This Month') +
            fChip('date','last-month','Last Month')

          fSection('Ownership',
            fChip('ownership','shared','Shared With Me') +
            fChip('ownership','created','Created By Me')

            fChip('sort','last-updated','Last Updated') +

          '<button onclick="(function(){var o=document.getElementById(\'al-filter-ov\');if(o)o.remove();alRefreshList();})()" style="display:block;width:100%;height:46px;border-radius:12px;border:none;background:' + T.blue + ';color:#fff;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;margin-top:20px;">Apply Filters</button>' +

    /* ── Shared deep-link handler ──

       Sets tagging state then navigates. Falls back to varun-tagging. */
    function deepLinkGo(cfg) {
      cfg = cfg || {};
      /* Mark matching notification as read */
      var cfgStr = JSON.stringify(cfg);
      for (var i = 0; i < NOTIF_DATA.length; i++) {
        if (JSON.stringify(NOTIF_DATA[i].deepLink) === cfgStr) {
          NOTIF_DATA[i].read = true;
          break;
        }
      }
      taggingOpenTab    = cfg.tab       || 'group';
      taggingCategory   = cfg.category  || '';
      taggingFaceFilter = cfg.face      || '';
      go(cfg.screen || 'varun-tagging');
    }

    /* ── toggleNotif — flip state and update toggle DOM in-place (no sheet re-open) ── */
    function toggleNotif(key) {
      profileNotifs[key] = !profileNotifs[key];
      var on     = profileNotifs[key];
      var track  = document.getElementById('notif-track-' + key);
      var knob   = document.getElementById('notif-knob-' + key);
      if (!track || !knob) return;
      track.style.background = on ? T.blue : T.bgSub;
      knob.style.left  = on ? 'auto'  : '3px';
      knob.style.right = on ? '3px'   : 'auto';
    }

    /* ── showNotificationsSheet ── */
    function showNotificationsSheet() {
      var phone = document.getElementById('phone');
      /* If sheet already open, don't re-create it — just bring it into view */
      if (document.getElementById('notifs-overlay')) return;

      function togRow(key, icon, title, sub) {
        var on = profileNotifs[key];
        return (
          '<div style="display:flex;align-items:center;gap:14px;padding:16px 0;' +
                      'border-bottom:0.5px solid ' + T.bgSub + ';">' +
            '<div style="width:36px;height:36px;border-radius:10px;' +
                        'background:' + T.bgSub + ';flex-shrink:0;' +
                        'display:flex;align-items:center;justify-content:center;">' +
              '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"' +
                   ' stroke="' + T.text + '" stroke-width="2" stroke-linecap="round">' + icon + '</svg>' +
            '</div>' +
            '<div style="flex:1;min-width:0;">' +
              '<div style="font-size:14px;font-weight:500;color:' + T.text + ';">' + title + '</div>' +
              '<div style="font-size:12px;color:' + T.textS + ';margin-top:2px;">' + sub + '</div>' +
            '</div>' +
            /* Toggle — tapping calls toggleNotif() which patches DOM in-place */
            '<div id="notif-track-' + key + '"' +
                 ' onclick="toggleNotif(\'' + key + '\')"' +
                 ' style="width:44px;height:26px;border-radius:13px;cursor:pointer;flex-shrink:0;' +
                        'background:' + (on ? T.blue : T.bgSub) + ';' +
                        'position:relative;transition:background .18s;">' +
              '<div id="notif-knob-' + key + '"' +
                   ' style="position:absolute;top:3px;' +
                           (on ? 'right:3px;left:auto;' : 'left:3px;right:auto;') +
                           'width:20px;height:20px;border-radius:50%;background:#fff;' +
                           'box-shadow:0 1px 4px rgba(0,0,0,.18);transition:left .18s,right .18s;"></div>' +
            '</div>' +
          '</div>'
        );
      }

      var overlay = document.createElement('div');

      overlay.onclick = function () {

        if (s) s.style.transform = 'translateY(100%)';

      overlay.innerHTML = (

    /* ─────────────────────────────────────────────────────
       SCREEN MAP
    ───────────────────────────────────────────────────── */
    var SCREEN_MAP = {
      'entry':               screenEntry,
      'varun-reg':           screenVarunReg,
      'varun-otp':           screenVarunOtp,
      'varun-profile':       screenVarunProfile,
      'varun-home':          screenAlbumListing,
      'varun-create-group':  screenVarunCreateGroup,
      'varun-sync':          screenVarunSync,
      'varun-tagging':       screenVarunTagging,
      'beulah-scene':        screenBeulahScene,
      'beulah-install':      screenBeulahInstall,
      'beulah-home':         screenAlbumListing,
      'mayank-scene':        screenMayankScene,
      'mayank-home':         screenAlbumListing,
      'kavitha-scene':       screenKavithaScene,
      'kavitha-install':     screenKavithaInstall,
      'kavitha-home':        screenAlbumListing,
      'vishal-scene':        screenVishalScene,
      'vishal-install':      screenVishalInstall,
      'vishal-home':         screenAlbumListing,
      'anand-scene':         screenAnandScene,
      'anand-home':          screenAlbumListing,
      'activity':            screenActivity,
      'notifications':       screenNotifications,
      'album-see-all':       screenSeeAll,
      'profile':             screenProfile,
      'edit-profile':        screenEditProfile,
      'circle':              screenCircle,
      'subscription':        screenSubscription,
    };

    /* ─────────────────────────────────────────────────────
       RENDER
       Replaces current .screen with the new screen function's output.
       Never patches innerHTML on a live screen.
    ───────────────────────────────────────────────────── */
    function render() {
      var phone = document.getElementById('phone');
      var fn    = SCREEN_MAP[state.screen];
      if (!fn) { state.screen = 'entry'; render(); return; }

      /* Build new screen at opacity 0 before old one leaves */
      var tmp = document.createElement('div');
      tmp.innerHTML = fn();
      var newScreen = tmp.firstElementChild;
      newScreen.style.opacity    = '0';
      newScreen.style.transition = 'opacity .15s ease';

      /* Pin screen height immediately to match phone height (iOS 100dvh fix) */
      function pinScreenH(sc) {
        var vv = window.visualViewport;
        var h  = vv ? Math.round(vv.height) : window.innerHeight;
        if (h > 100 && window.innerWidth <= 600) sc.style.height = h + 'px';
      }

      var old = phone.querySelector('.screen');
      if (old) {
        /* Fade old screen out */
        old.style.transition = 'opacity .1s ease';
        old.style.opacity    = '0';
        setTimeout(function () {
          if (old.parentNode) old.remove();
          phone.appendChild(newScreen);
          pinScreenH(newScreen);
          /* Fade new screen in */
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              newScreen.style.opacity = '1';
            });
          });
          postRender();
        }, 100);
      } else {
        phone.appendChild(newScreen);
        pinScreenH(newScreen);
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            newScreen.style.opacity = '1';
          });
        });
        postRender();
      }
    }

    /* ─────────────────────────────────────────────────────
       POST-RENDER HOOKS
       Timers and focus calls that must run after DOM insert.
    ───────────────────────────────────────────────────── */
    function postRender() {
      /* Album listing search — restore focus after render */
      if (albumSearchOpen) {
        setTimeout(function () {
          var inp = document.getElementById('al-search');
          if (!inp) return;
          inp.focus();
          var l = inp.value.length;
          try { inp.setSelectionRange(l, l); } catch (e) {}
        }, 80);
      }

      if (state.screen === 'varun-reg') {
        /* Auto-focus phone input */
        setTimeout(function () {
          var inp = document.getElementById('phone-inp');
          if (!inp) return;
          inp.focus();
          var len = inp.value.length;
          try { inp.setSelectionRange(len, len); } catch (e) {}
        }, 150);
      }

      if (state.screen === 'varun-sync') {
        clearInterval(syncPhaseInt);
        syncProg = 0;
        syncDone = false;
        /* Reset grid cell reveal state */
        for (var gci = 0; gci < 9; gci++) {
          var gc = document.getElementById('sync-grid-cell-' + gci);
          if (gc) gc.removeAttribute('data-rev');
        }
        if (photoPermJustGranted) {
          photoPermJustGranted = false;
          setTimeout(function () { showSyncReassuranceSheet(); }, 320);
        }
      }

      /* Measure filter block height for smooth JS-driven animation */
      if (state.screen === 'varun-tagging') {
        /* Reset sticky mode state on fresh render */
        _stickyMode = 'people';
        var _ff = document.getElementById('tagging-filters-full');
        if (_ff) {
          /* Capture natural height, then switch from max-height to height */
          var _fh = _ff.scrollHeight;
          window._taggingFiltersH = _fh;
          _ff.style.transition = 'none';
          _ff.style.maxHeight  = 'none';
          _ff.style.height     = _fh + 'px';
          /* Re-enable transition next frame so initial render isn't animated */
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              if (_ff) _ff.style.transition = 'height .28s cubic-bezier(.4,0,.2,1),opacity .22s ease';
            });
          });
        }
      }

      if (state.screen === 'varun-create-group') {
        /* Restore cover photo if user navigated back after setting it */
        if (cgCoverSet) { setTimeout(function() { cgCoverTap(); }, 0); }
        /* Auto-focus group name field */
        setTimeout(function() {
          var inp = document.getElementById('cg-name');
          if (inp) inp.focus();
        }, 150);
      }

      if (state.screen === 'varun-profile') {
        /* Restore avatar if user navigated back after setting it */
        if (avatarSet) {
          setTimeout(function () { setDummyAvatar(); }, 0);
        }
        /* Focus name field */
        setTimeout(function () {
          var inp = document.getElementById('profile-name');
          if (inp) { inp.focus(); inp.select(); }
        }, 150);
      }

      if (state.screen === 'varun-otp') {
        /* Cancel any timers left over from a prior visit */
        clearInterval(otpResendInt);
        clearTimeout(otpExpiryTO);
        /* Reset countdown and start ticking */
        otpSecs = 30;
        otpResendInt = setInterval(otpTick, 1000);
        /* Start inactivity expiry clock */
        otpExpiryTO = setTimeout(otpExpire, 10000);
        /* Focus first box */
        setTimeout(function () {
          var first = document.getElementById('otp-0');
          if (first) first.focus();
        }, 150);
      }

    }

    /* ─────────────────────────────────────────────────────
       DEBUG OVERLAY — triple-tap bottom-right corner to toggle
       Shows raw pixel values so we can diagnose layout gaps on iOS.
       Remove once layout is confirmed correct.
    ───────────────────────────────────────────────────── */
    (function() {
      var _tc = 0, _tt = 0;
      document.addEventListener('touchend', function(e) {
        var t = e.changedTouches[0];
        /* Bottom-right 60×60px zone */
        if (t.clientX < window.innerWidth - 60 || t.clientY < window.innerHeight - 60) {
          _tc = 0; return;
        }
        var now = Date.now();
        if (now - _tt > 700) _tc = 0;
        _tt = now;
        _tc++;
        if (_tc >= 3) {
          _tc = 0;
          var el = document.getElementById('_dbg');
          if (el) { el.remove(); return; }
          var phone  = document.getElementById('phone');
          var screen = phone ? phone.querySelector('.screen') : null;
          var vv     = window.visualViewport;
          var lines  = [
            'innerW  : ' + window.innerWidth,
            'innerH  : ' + window.innerHeight,
            'vv.h    : ' + (vv ? Math.round(vv.height) : 'n/a'),
            'vv.w    : ' + (vv ? Math.round(vv.width)  : 'n/a'),
            'screen.h: ' + window.screen.height,
            'screen.w: ' + window.screen.width,
            'dpr     : ' + window.devicePixelRatio,
            'phone H : ' + (phone  ? phone.offsetHeight  : 'n/a'),
            'phone pH: ' + (phone  ? phone.style.height  : 'n/a'),
            'scr  H  : ' + (screen ? screen.offsetHeight : 'n/a'),
            'scr pH  : ' + (screen ? screen.style.height : 'n/a'),
            'safeTop : ' + getComputedStyle(document.documentElement).getPropertyValue('--safe-top'),
            'standalone: ' + (window.navigator.standalone === true || window.matchMedia('(display-mode:standalone)').matches),
          ];
          var box = document.createElement('div');
          box.id = '_dbg';
          box.style.cssText = [
            'position:fixed','bottom:80px','left:12px','right:12px','z-index:99999',
            'background:rgba(0,0,0,.88)','color:#0f0','font:12px/1.7 monospace',
            'padding:12px 14px','border-radius:10px','white-space:pre',
            'pointer-events:none'
          ].join(';');
          box.textContent = lines.join('\n');
          document.body.appendChild(box);
        }
      });
    }());

    /* ─────────────────────────────────────────────────────
       APP OPEN SPLASH
       Called when user taps a link in WhatsApp / SMS / Email / Instagram.
       Shows a 1.5s blue splash with animated PixSlay logo, then navigates.
    ───────────────────────────────────────────────────── */
    function openApp(dest) {
      var phone = document.getElementById('phone');
      if (!phone) { go(dest); return; }

      var splash = document.createElement('div');
      splash.style.cssText = (
        'position:absolute;inset:0;z-index:9999;background:#1B4FD8;' +
        'display:flex;flex-direction:column;align-items:center;justify-content:center;'
      );
      splash.innerHTML = (
        '<div id="_spl" style="opacity:0;transform:scale(0.82);text-align:center;' +
             'transition:opacity .45s ease,transform .45s ease;">' +
          '<div style="width:72px;height:72px;border-radius:20px;' +
                      'background:rgba(255,255,255,.15);' +
                      'display:flex;align-items:center;justify-content:center;' +
                      'margin:0 auto 14px;">' +
            '<svg width="38" height="38" viewBox="0 0 24 24" fill="none"' +
                 ' stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
              '<path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>' +
              '<circle cx="12" cy="13" r="4"/>' +
            '</svg>' +
          '</div>' +
          '<p style="font-size:26px;font-weight:800;color:#fff;letter-spacing:-.5px;">' +
            'Pix<span style="opacity:.65;">slay</span>' +
          '</p>' +
        '</div>'
      );
      phone.appendChild(splash);

      setTimeout(function() {
        var el = document.getElementById('_spl');
        if (el) { el.style.opacity = '1'; el.style.transform = 'scale(1)'; }
      }, 40);

      setTimeout(function() {
        go(dest);
        splash.style.transition = 'opacity .3s ease';
        splash.style.opacity = '0';
        setTimeout(function() { splash.remove(); }, 300);
      }, 1600);
    }

    /* ─────────────────────────────────────────────────────
       REFRESH CHECK
       Red button on entry screen → tapping forces SW update + reload.
       After reload, sessionStorage flag makes button render green.
    ───────────────────────────────────────────────────── */
    function doRefresh() {
      var btn = document.getElementById('_refresh-btn');
      if (btn) {
        btn.style.background = '#888';
        btn.innerHTML = '<span style="font-size:16px;">↻</span> Checking…';
      }
      function afterCheck() {
        sessionStorage.setItem('_refreshed', '1');
        setTimeout(function() { location.reload(); }, 600);
      }
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistration('/').then(function(reg) {
          if (reg) { reg.update().then(afterCheck).catch(afterCheck); }
          else { afterCheck(); }
        }).catch(afterCheck);
      } else {
        afterCheck();
      }
    }

    /* ─────────────────────────────────────────────────────
       BOOT
    ───────────────────────────────────────────────────── */
    /* Set phone height before first render so layout is correct immediately */
    if (window._setPhoneH) window._setPhoneH();
    render();
  </script>

  <!-- PWA: service worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/service-worker.js')
          .catch(function(err) { console.warn('SW registration failed:', err); });
      });
    }
  </script>
