<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PixSlay</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1B4FD8">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PixSlay">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #E8E4DF;
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    .phone {
      width: 390px;
      height: 844px;
      min-height: 844px;
      background: #F8F7F5;
      border-radius: 50px;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
      box-shadow: 0 0 0 8px #2E2A26, 0 0 0 10px #1A1610, 0 32px 64px rgba(0,0,0,.35);
      padding-bottom: env(safe-area-inset-bottom, 0);
    }

    /* ── Prevent rubber-band / overscroll bounce everywhere ── */
    html, body { overscroll-behavior: none; }

    /* ── Kill tap flash on every interactive element ── */
    * { -webkit-tap-highlight-color: transparent; }

    /* ── Mobile + PWA: fills screen edge to edge ──────────────
       position:fixed can misbehave on iOS PWA when html/body has overflow:hidden.
       Instead the phone's HEIGHT is set directly by JS (_setPhoneH) on every
       visualViewport change, so it is always pixel-perfect and keyboard-aware.
       CSS only sets position/width; JS owns height. */
    @media (max-width: 500px), (display-mode: standalone) {
      body {
        padding: 0;
        background: #F8F7F5;
        align-items: flex-start;
        overflow: hidden;
        overscroll-behavior: none;
      }
      .phone {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        /* height intentionally omitted — set by _setPhoneH() in JS */
        min-height: 0;
        max-height: none;
        border-radius: 0;
        box-shadow: none;
        padding-top: 0;
        padding-bottom: 0;
        overscroll-behavior: none;
      }
    }

    /* ── Prevent iOS Safari zoom on input focus ──────────────
       iOS zooms any focused input with font-size < 16px.
       Applies on mobile/PWA only; desktop demo is unaffected. */
    @media (max-width: 500px), (display-mode: standalone) {
      #phone input,
      #phone textarea,
      #phone select { font-size: 16px !important; }
    }

    /* People row — reveal animation for newly expanded chips */
    @keyframes pplReveal {
      from { opacity:0; transform:translateX(10px); }
      to   { opacity:1; transform:translateX(0); }
    }

    /* OTP error shake */
    @keyframes otpShake {
      0%,100% { transform:translateX(0); }
      18%     { transform:translateX(-6px); }
      36%     { transform:translateX(6px); }
      54%     { transform:translateX(-4px); }
      72%     { transform:translateX(4px); }
      90%     { transform:translateX(-2px); }
    }
    .otp-shake { animation:otpShake .4s ease; }

    /* Hide scrollbars on horizontal scroll rows — mobile users
       recognise partially-clipped content as a scroll cue */
    .hscroll { -ms-overflow-style:none; scrollbar-width:none; }
    .hscroll::-webkit-scrollbar { display:none; }

    /* Primary photo browsing experiences should use visually hidden scrollbars
       for a cleaner and more immersive experience. Momentum scrolling is
       preserved via -webkit-overflow-scrolling:touch. */
    .pscroll { -ms-overflow-style:none; scrollbar-width:none;
               -webkit-overflow-scrolling:touch; }
    .pscroll::-webkit-scrollbar { display:none; }

    /* Hide scrollbars everywhere inside the phone frame */
    #phone *::-webkit-scrollbar { display:none; }
    #phone * { -ms-overflow-style:none; scrollbar-width:none; }

    /* Desktop: screen fills the 844px phone frame exactly. */
    .screen { height: 100%; }

    /* Mobile / PWA: JS (_setPhoneH) owns .screen height directly to avoid
       the iOS PWA standalone bug where 100dvh = 844px (full screen height)
       instead of window.innerHeight = 797px, which creates a visible gap
       above the nav bar / CTA. height:auto is the CSS fallback; JS sets the
       exact pixel value on every render and visualViewport change. */
    @media (max-width: 500px), (display-mode: standalone) {
      .screen {
        height: auto;  /* JS sets exact px via inline style */
      }
    }
  </style>
  <!-- Mobile layout engine.
       position:fixed has known iOS PWA bugs when body has overflow:hidden.
       Instead we set the phone element height directly from JS on every
       visualViewport change — this is immune to all CSS cascade issues.
       --safe-top is also measured here (env(safe-area-inset-top) is unreliable
       on many Android PWA builds; we derive it from screen vs viewport gap). -->
  <script>
    (function() {

      /* ── Detect mobile: applies the dynamic sizing only on small screens ── */
      function isMobile() {
        return window.innerWidth <= 600 ||
               window.matchMedia('(display-mode: standalone)').matches ||
               window.navigator.standalone === true;
      }

      /* ── Safe-top: only needed as a fallback for Android builds where
         env(safe-area-inset-top) is defined but returns 0 even when content
         goes behind the status bar. screen.height is already in CSS pixels —
         do NOT divide by dpr (that was a bug causing 844/3=281 on iPhone 13). ── */
      function measureSafeTop() {
        if (!isMobile()) return;
        var h       = window.innerHeight;
        if (h < 100) return;
        var screenH = window.screen.height; /* CSS pixels, not physical */
        var gap     = screenH - h;
        /* Only set if the gap is tiny (≤5px) — meaning content IS behind the
           status bar (full-bleed) and env() appears broken. On iOS the gap is
           ~47px (status bar excluded from viewport) so we leave env() alone. */
        if (gap >= 0 && gap <= 5) {
          /* Full-bleed: content goes under status bar. If env() is 0, use
             a safe Android fallback so content doesn't hide under the bar. */
          document.documentElement.style.setProperty('--safe-top', '24px');
        }
      }

      /* ── Phone + screen height: set inline so it wins over every CSS rule ──
         Uses visualViewport.height which shrinks when the keyboard opens,
         so the nav bar / CTAs always stay above the keyboard.
         We also set .screen height directly because on iOS PWA standalone,
         100dvh resolves to the full screen height (844px on iPhone 13) rather
         than window.innerHeight (797px), causing a visible gap above the nav bar. */
      function setPhoneH() {
        if (!isMobile()) return;
        var phone = document.getElementById('phone');
        if (!phone) return;
        var vv = window.visualViewport;
        var h  = vv ? Math.round(vv.height) : window.innerHeight;
        if (h < 100) return;
        phone.style.height = h + 'px';
        /* Also pin the active .screen to the same height */
        var screen = phone.querySelector('.screen');
        if (screen) screen.style.height = h + 'px';
      }

      /* Expose globally so boot script can call before first render() */
      window._setPhoneH = setPhoneH;

      /* Run as early as possible */
      measureSafeTop();

      document.addEventListener('DOMContentLoaded', function() {
        measureSafeTop();
        setPhoneH();
      });

      window.addEventListener('load', function() {
        measureSafeTop();
        setPhoneH();
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', function() {
            setPhoneH();
          });
          window.visualViewport.addEventListener('scroll', function() {
            setPhoneH();
          });
        }
      });

      /* Belt-and-suspenders: re-measure 300 ms after load (iOS quirk) */
      window.addEventListener('load', function() {
        setTimeout(function() { measureSafeTop(); setPhoneH(); }, 300);
      });

      window.addEventListener('resize', function() {
        measureSafeTop();
        setPhoneH();
      });

    }());
  </script>
</head>
<body>
  <div class="phone" id="phone">

  </div>

  <script>
    /* ─────────────────────────────────────────────────────
       DESIGN TOKENS
       Single source of truth. Never hardcode hex values inline.
    ───────────────────────────────────────────────────── */
    var T = {
      blue:    '#1B4FD8',
      blueH:   '#2960F5',
      blueTint:'#EEF2FD',
      blueBdr: '#C7D4FB',
      blueDk:  '#0C447C',
      blueDp:  '#185FA5',
      white:   '#FFFFFF',
      bgWarm:  '#F8F7F5',
      bgSub:   '#F0EEEB',
      text:    '#1A1917',
      textS:   '#6B6864',
      textT:   '#A8A49F',
      textD:   '#D4D1CC',
      ok:      '#0F9E6E',
      alert:   '#E8490F',
      amber:   '#F5A623',
    };

    /* ─────────────────────────────────────────────────────
       STATE + NAVIGATION
    ───────────────────────────────────────────────────── */
    var state = {
      screen:    'entry',
      journey:   'varun',
      completed: [],
      backOnce:  false,
      /* Trip timing — pre-filled from group creation, editable in sync sheet */
      syncTiming: {
        fromDate: '10 Aug 2025',
        fromTime: '8:00 AM',
        toDate:   '20 Aug 2025',
        toTime:   '6:00 PM',
      },
    };

    function go(s) {
      state.screen   = s;
      state.backOnce = false;
      render();
    }

    /* ─────────────────────────────────────────────────────
       UTILITY: TOAST
       Slides down from top of phone frame. Auto-dismisses 3s.
    ───────────────────────────────────────────────────── */
    function showToast(msg, type) {
      var old = document.getElementById('toast');
      if (old) old.remove();

      var bg = (type === 'error') ? T.alert : T.ok;
      var t  = document.createElement('div');
      t.id = 'toast';
      t.setAttribute('style',
        'position:absolute;top:-52px;left:16px;right:16px;' +
        'height:48px;background:' + bg + ';border-radius:12px;' +
        'z-index:10000;display:flex;align-items:center;' +
        'padding:0 16px;font-family:inherit;' +
        'font-size:13px;font-weight:600;color:#fff;' +
        'transition:top .2s cubic-bezier(0.4,0,0.2,1);'
      );
      t.textContent = msg;
      document.getElementById('phone').appendChild(t);

      requestAnimationFrame(function () {
        requestAnimationFrame(function () { t.style.top = '16px'; });
      });
      setTimeout(function () {
        t.style.top = '-52px';
        setTimeout(function () { if (t.parentNode) t.remove(); }, 220);
      }, 3000);
    }

    /* ─────────────────────────────────────────────────────
       UTILITY: LOGO
       Icon per DESIGN.md: 44px square, 12px radius, #1B4FD8.
       Photo frame with corner brackets + viewfinder circle + dot.
       Wordmark: "Pi" + blue "x" + "slay", weight 800.
    ───────────────────────────────────────────────────── */
    function logo(iconPx, textPx) {
      iconPx = iconPx || 28;
      textPx = textPx || 22;
      var r     = Math.round(iconPx * 0.27);   /* ~12px on 44px icon */
      var inner = Math.round(iconPx * 0.62);

      return (
        '<div onclick="go(\'entry\')" style="display:flex;align-items:center;gap:8px;cursor:pointer;">' +
          '<div style="' +
            'width:' + iconPx + 'px;' +
            'height:' + iconPx + 'px;' +
            'background:' + T.blue + ';' +
            'border-radius:' + r + 'px;' +
            'display:flex;align-items:center;justify-content:center;' +
            'flex-shrink:0;">' +
            /* Photo frame rect + corner brackets + viewfinder circle + inner dot */
            '<svg width="' + inner + '" height="' + inner + '"' +
                 ' viewBox="0 0 20 20" fill="none"' +
                 ' stroke="white" stroke-width="2"' +
                 ' stroke-linecap="round" stroke-linejoin="round">' +
              '<rect x="1" y="3" width="18" height="14" rx="2"/>' +
              '<polyline points="1,6.5 1,3 4.5,3"   stroke-width="2.2"/>' +
              '<polyline points="15.5,3 19,3 19,6.5" stroke-width="2.2"/>' +
              '<polyline points="1,13.5 1,17 4.5,17"   stroke-width="2.2"/>' +
              '<polyline points="15.5,17 19,17 19,13.5" stroke-width="2.2"/>' +
              '<circle cx="10" cy="10" r="3.2"/>' +
              '<circle cx="10" cy="10" r="1" fill="white" stroke="none"/>' +
            '</svg>' +
          '</div>' +
          /* Wordmark: Pi [x in blue] slay */
          '<span style="font-size:' + textPx + 'px;font-weight:800;' +
               'letter-spacing:-0.3px;font-family:inherit;">' +
            '<span style="color:' + T.text + ';">Pi</span>' +
            '<span style="color:' + T.blue + ';">x</span>' +
            '<span style="color:' + T.text + ';">slay</span>' +
          '</span>' +
        '</div>'
      );
    }

    /* ─────────────────────────────────────────────────────
       UTILITY: SWITCH JOURNEY PILL
       Appears on every screen. position:absolute, z:9999.
       Tapping always returns to entry from anywhere.
    ───────────────────────────────────────────────────── */
    /* ── Demo: triple-tap top-right corner → journey switcher ──
       Invisible 48×48 zone. No visual trace on screen. */
    var _demoTapCount = 0, _demoTapTimer = null;
    function _demoTap() {
      _demoTapCount++;
      clearTimeout(_demoTapTimer);
      if (_demoTapCount >= 3) {
        _demoTapCount = 0;
        go('entry');
        return;
      }
      _demoTapTimer = setTimeout(function () { _demoTapCount = 0; }, 600);
    }
    function switchPill() {
      return (
        '<div onclick="_demoTap()" style="' +
          'position:absolute;top:0;right:0;' +
          'width:56px;height:56px;' +
          'z-index:9999;cursor:default;">' +
        '</div>'
      );
    }

    /* ─────────────────────────────────────────────────────
       UTILITY: STATUS BAR
       Desktop/browser demo  → renders fake 44px bar (time + icons)
       PWA standalone mode   → renders a safe-area spacer only
                               (real device status bar is already visible)
    ───────────────────────────────────────────────────── */
    var IS_PWA = (
      window.matchMedia('(display-mode: standalone)').matches ||
      window.navigator.standalone === true ||   /* iOS Safari PWA */
      window.matchMedia('(max-width: 500px)').matches /* real phone — never show fake bar */
    );

    function sbar(bg) {
      bg = bg || '#fff';

      /* PWA / real mobile: safe-area spacer that clears the real status bar.
         Use env(safe-area-inset-top) directly — the browser knows best:
         • If viewport starts BELOW the status bar → env() = 0 → no spacer (correct)
         • If viewport goes UNDER the status bar → env() = 47px etc (correct)
         Removing the old 52px hardcoded minimum which caused excess padding. */
      if (IS_PWA) {
        return (
          '<div style="' +
            'height:env(safe-area-inset-top,0px);' +
            'background:' + bg + ';' +
            'flex-shrink:0;">' +
          '</div>'
        );
      }

      /* Desktop demo: plain coloured bar — no fake time or icons */
      return (
        '<div style="height:44px;background:' + bg + ';flex-shrink:0;"></div>'
      );
    }

    /* ─────────────────────────────────────────────────────
       COMPONENT: floatInput
       ─────────────────────────────────────────────────────
       CRITICAL per TECHNICAL.md: label position controlled
       entirely via inline onfocus/onblur style manipulation.
       DO NOT use CSS ~ sibling selectors — they fail on
       dynamically injected innerHTML in all browsers.

       States:
         Empty:  label centred vertically (acts as watermark)
         Focus:  label floats to top, border → blue
         Filled: label stays at top, border → light blue
    ───────────────────────────────────────────────────── */
    function floatInput(label, id, value, type, oninputCb, inputmode, bgColor) {
      value     = (value  === undefined || value  === null) ? '' : String(value);
      type      = type    || 'text';
      oninputCb = oninputCb || '';
      inputmode = inputmode || (type === 'tel' ? 'numeric' : 'text');
      bgColor   = bgColor   || '#fff';

      var filled = value.length > 0;

      /* Label position constants — embedded in inline style strings */
      var FLOATED = 'top:0;transform:translateY(-50%);font-size:11px;font-weight:600;padding:0 4px;';
      var RESTING = 'top:50%;transform:translateY(-50%);font-size:14px;font-weight:400;padding:0;';
      var BASE    = 'position:absolute;left:14px;background:' + bgColor + ';pointer-events:none;transition:all .15s;';

      var initLbl    = BASE + (filled
        ? FLOATED + 'color:' + T.textT + ';'
        : RESTING + 'color:' + T.textT + ';');
      var initBorder = filled ? '0.5px solid ' + T.blueBdr : '0.5px solid ' + T.bgSub;

      /* BASE with correct bg baked into the event handler strings */
      var BASE_BG = 'position:absolute;left:14px;background:' + bgColor + ';pointer-events:none;transition:all .15s;';
      var focusHandler = (
        'var l=document.getElementById(\'' + id + '-lbl\');' +
        'if(l) l.style.cssText=\'' + BASE_BG + FLOATED + 'color:' + T.blue + ';\';' +
        'this.style.border=\'1px solid ' + T.blue + '\';'
      );
      var blurHandler = (
        'var l=document.getElementById(\'' + id + '-lbl\');' +
        'if(this.value){' +
          'if(l) l.style.cssText=\'' + BASE_BG + FLOATED + 'color:' + T.textT + ';\';' +
          'this.style.border=\'0.5px solid ' + T.blueBdr + '\';' +
        '} else {' +
          'if(l) l.style.cssText=\'' + BASE_BG + RESTING + 'color:' + T.textT + ';\';' +
          'this.style.border=\'0.5px solid ' + T.bgSub + '\';}' +
        'this.style.color=\'' + T.text + '\';'
      );

      return (
        '<div style="position:relative;margin-bottom:12px;">' +
          '<input' +
            ' id="' + id + '"' +
            ' type="' + type + '"' +
            ' inputmode="' + inputmode + '"' +
            ' value="' + value + '"' +
            ' autocomplete="off"' +
            ' style="' +
              'width:100%;height:46px;' +
              'border:' + initBorder + ';' +
              'border-radius:10px;' +
              'padding:' + (filled ? '14px 14px 3px' : '0 14px') + ';' +
              'font-family:inherit;font-size:14px;font-weight:400;' +
              'color:' + T.text + ';' +
              'background:' + bgColor + ';outline:none;' +
              'transition:border .15s,padding .15s;"' +
            ' onfocus="' + focusHandler + 'this.style.padding=\'14px 14px 3px\';"' +
            ' onblur="'  + blurHandler  + 'if(!this.value) this.style.padding=\'0 14px\';"' +
            (oninputCb ? ' oninput="' + oninputCb + '"' : '') +
          '>' +
          '<label' +
            ' id="' + id + '-lbl"' +
            ' for="' + id + '"' +
            ' style="' + initLbl + '"' +
          '>' + label + '</label>' +
        '</div>'
      );
    }

    /* ─────────────────────────────────────────────────────
       PHONE INPUT HANDLER
       Activates Continue when 10 digits are entered.
    ───────────────────────────────────────────────────── */
    function onPhoneInput(el) {
      var btn = document.getElementById('continue-btn');
      if (!btn) return;
      var ok = el.value.replace(/\D/g, '').length === 10;
      btn.disabled         = !ok;
      btn.style.background = ok ? T.blue    : T.bgSub;
      btn.style.color      = ok ? '#fff'    : T.textT;
      btn.style.cursor     = ok ? 'pointer' : 'default';
    }

    /* Demo shortcut — tap the phone field to auto-fill number + proceed.
       Guard prevents double-fire if focus + click land together. */
    var _phoneFilling = false;
    function fillPhone() {
      if (_phoneFilling) return;
      _phoneFilling = true;
      var inp = document.getElementById('phone-inp');
      if (!inp) { _phoneFilling = false; return; }
      inp.value = '9876543210';
      onPhoneInput(inp);
      setTimeout(function() {
        _phoneFilling = false;
        go('varun-otp');
      }, 500);
    }

    /* ─────────────────────────────────────────────────────
       BACK HANDLER — single tap returns to entry
    ───────────────────────────────────────────────────── */
    function handleBack() {
      go('entry');
    }

    /* ─────────────────────────────────────────────────────
       SHARED: screenHeader
       Consistent top bar — back arrow | centred title | optional right slot.
       backDest: route string, or '__back__' to call handleBack(), or null for no arrow.
       title: string or null (onboarding screens have no centred title).
       rightAction: raw HTML string for right slot, or null.
    ───────────────────────────────────────────────────── */
    function screenHeader(title, backDest, rightAction) {
      var backBtn = backDest
        ? '<button onclick="' + (backDest === '__back__' ? 'handleBack()' : 'go(\'' + backDest + '\')') + '"' +
                 ' style="width:34px;height:34px;border-radius:10px;border:none;' +
                        'background:' + T.bgSub + ';cursor:pointer;display:flex;' +
                        'align-items:center;justify-content:center;flex-shrink:0;">' +
            '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"' +
                 ' stroke="' + T.text + '" stroke-width="2.5" stroke-linecap="round">' +
              '<polyline points="15 18 9 12 15 6"/>' +
            '</svg>' +
          '</button>'
        : '<div style="width:34px;height:34px;flex-shrink:0;"></div>';

      return (
        '<div style="height:52px;display:flex;align-items:center;' +
             'padding:0 16px;flex-shrink:0;position:relative;">' +
          backBtn +
          (title
            ? '<span style="position:absolute;left:50%;transform:translateX(-50%);' +
                     'font-size:16px;font-weight:700;color:' + T.text + ';white-space:nowrap;">' + title + '</span>'
            : '') +
          '<div style="flex:1;"></div>' +
          (rightAction || '<div style="width:34px;height:34px;flex-shrink:0;"></div>') +
        '</div>'
      );
    }

    /* ═════════════════════════════════════════════════════
       SCREEN: varun-reg  (Varun — Screen 1: Phone Registration)
       ─────────────────────────────────────────────────────
       Layout (top → bottom):
         Switch Journey pill (absolute z:9999)
         Status bar (44px, flex-shrink:0)
         Scrollable body (flex:1, overflow-y:auto):
           Logo centered, 60px padding-top
           Headline 24px/800
           Subhead 13px/400
           Phone floatInput pre-filled "+91"
           Hint 11px/500 centred
           Flex spacer
         Button area (flex-shrink:0, pinned to bottom):
           Continue 50px primary (disabled until 10 digits)
           Back 44px ghost (always enabled)
    ═════════════════════════════════════════════════════ */
    function screenVarunReg() {
      return (
        '<div class="screen"' +
             ' style="position:absolute;inset:0;' +
                    'display:flex;flex-direction:column;' +
                    'background:#fff;">' +

          switchPill() +
          sbar('#fff') +
          screenHeader(null, '__back__') +

          /* ── Scrollable body ── */
          '<div style="flex:1;overflow-y:auto;padding:0 24px;' +
               'display:flex;flex-direction:column;">' +

            /* Logo */
            '<div style="margin-bottom:36px;">' +
              logo(28, 22) +
            '</div>' +

            /* Headline */
            '<h1 style="font-size:26px;font-weight:800;' +
                       'color:' + T.text + ';letter-spacing:-0.6px;' +
                       'line-height:1.2;margin-bottom:10px;">' +
              'Every gathering.<br>Every photo.<br>One place.' +
            '</h1>' +

            '<p style="font-size:13px;font-weight:400;' +
                      'color:' + T.textS + ';line-height:1.55;' +
                      'margin-bottom:32px;">' +
              'Start with your number — we\'ll send a quick code.' +
            '</p>' +

            /* Phone row: +91 chip + input */

    /* ─────────────────────────────────────────────────────
       OTP — GLOBALS
       Timer IDs stored here so postRender can cancel old ones
       when the screen is re-entered or navigated away from.
    ───────────────────────────────────────────────────── */
    var otpResendInt = null;
    var otpExpiryTO  = null;
    var otpSecs      = 30;

    /* Demo shortcut — tap any box to fill all 4 and auto-proceed.
       Guard prevents double-fire from focus + click landing together. */
    var _otpFilling = false;
    function fillOtp() {
      if (_otpFilling) return;
      _otpFilling = true;
      var demo = ['1','2','3','4'];
      for (var i = 0; i < 4; i++) {
        var box = document.getElementById('otp-' + i);
        if (box) {
          box.value            = demo[i];
          box.style.background = T.blueTint;
          box.style.border     = '1.5px solid ' + T.blueBdr;
        }
      }
      clearInterval(otpResendInt);
      clearTimeout(otpExpiryTO);
      setTimeout(function () { _otpFilling = false; go(otpDest); }, 420);
    }

    /* Auto-advance on digit entry. Auto-submit on 6th box. */
    function otpInput(id, i, dest, el) {
      el.value = el.value.replace(/[^0-9]/g, '').slice(-1);
      if (el.value) {
        el.style.background = T.blueTint;
        el.style.border     = '0.5px solid ' + T.blueBdr;
        var next = document.getElementById(id + '-' + (i + 1));
        if (next) {
          next.focus();
        } else {
          setTimeout(function () { go(dest); }, 300);
        }
      }
      /* Reset inactivity expiry timer on every keystroke */
      if (otpExpiryTO) clearTimeout(otpExpiryTO);
      otpExpiryTO = setTimeout(otpExpire, 10000);
    }

    /* Backspace on empty box focuses the previous box */
    function otpBack(id, i, e) {
      if (e.key === 'Backspace') {
        var el = document.getElementById(id + '-' + i);
        if (el && !el.value && i > 0) {
          var prev = document.getElementById(id + '-' + (i - 1));
          if (prev) {
            prev.value = '';
            prev.style.background = '#fff';
            prev.style.border = '0.5px solid ' + T.bgSub;
            prev.focus();
          }
        }
      }
    }

    /* Tick the resend countdown every second */
    function otpTick() {
      var el = document.getElementById('otp-resend');
      if (!el) { clearInterval(otpResendInt); return; }
      otpSecs--;
      if (otpSecs <= 0) {
        clearInterval(otpResendInt);
        el.innerHTML =
          '<button onclick="otpResend()" style="' +
            'background:none;border:none;font-family:inherit;' +
            'font-size:13px;font-weight:600;' +
            'color:' + T.blue + ';cursor:pointer;">' +
            'Resend code' +
          '</button>';
      } else {
        el.textContent = 'Resend in 0:' + (otpSecs < 10 ? '0' : '') + otpSecs;
      }
    }

    /* Resend tapped — clear boxes, reset countdown, refocus */
    function otpResend() {
      for (var i = 0; i < 4; i++) {
        var box = document.getElementById('otp-' + i);
        if (box) {
          box.value = '';
          box.style.background = '#fff';
          box.style.border = '0.5px solid ' + T.bgSub;
        }
      }
      var err = document.getElementById('otp-err');
      if (err) err.style.visibility = 'hidden';
      otpSecs = 30;
      clearInterval(otpResendInt);
      otpResendInt = setInterval(otpTick, 1000);
      var resendEl = document.getElementById('otp-resend');
      if (resendEl) resendEl.textContent = 'Resend in 0:30';
      clearTimeout(otpExpiryTO);
      otpExpiryTO = setTimeout(otpExpire, 10000);
      var first = document.getElementById('otp-0');
      if (first) first.focus();
    }

    /* 10 s inactivity — show expired message and reset countdown */
    function otpExpire() {
      var err = document.getElementById('otp-err');
      if (!err) return;
      err.textContent = 'Code expired. A new one has been sent.';
      err.style.visibility = 'visible';
      otpSecs = 30;
      clearInterval(otpResendInt);
      otpResendInt = setInterval(otpTick, 1000);
      var resendEl = document.getElementById('otp-resend');
      if (resendEl) resendEl.textContent = 'Resend in 0:30';
    }

      var isPixslay = false;
      for (var pi = 0; pi < CG_PEOPLE.length; pi++) {

    var syncPhaseInt = null;

    var syncDone     = false;

    /* Photo indices used for sync grid reveal — spread across the trip */
    var SYNC_GRID_PHOTOS = [0, 3, 6, 9, 12, 1, 4, 8, 11];
    /* Progress % at which each cell (0-8) reveals */
    var SYNC_GRID_THRESH = [12, 24, 36, 46, 57, 67, 76, 86, 95];

    function syncUpdateBar(pct) {
      var fill    = document.getElementById('sync-bar-fill');
      var counter = document.getElementById('sync-counter');
      if (fill)    fill.style.width = pct + '%';
      if (counter) counter.textContent = 'Scanning ' + Math.round((pct / 100) * 847) + ' photos...';

      /* Reveal grid cells as % crosses each threshold */
      for (var ci = 0; ci < SYNC_GRID_THRESH.length; ci++) {
        if (pct >= SYNC_GRID_THRESH[ci]) {
          var cell = document.getElementById('sync-grid-cell-' + ci);
          if (cell && !cell.getAttribute('data-rev')) {
            cell.setAttribute('data-rev', '1');
            var photoSrc = PHOTO_FILES[SYNC_GRID_PHOTOS[ci] % PHOTO_FILES.length];
            cell.style.opacity = '0';
            cell.innerHTML = (
              '<img src="' + photoSrc + '"' +
                   ' style="width:100%;height:100%;object-fit:cover;display:block;">'
            );
            (function (c) {
              requestAnimationFrame(function () {
                requestAnimationFrame(function () { c.style.opacity = '1'; });
              });
            }(cell));
          }
        }
      }
    }

    function closeSyncReassuranceSheet(startSync) {
      /* Save any edited field values back to state.syncTiming */
      var fd = document.getElementById('sr-from-date');
      var ft = document.getElementById('sr-from-time');
      var td = document.getElementById('sr-to-date');
      var tt = document.getElementById('sr-to-time');
      if (fd && fd.value) state.syncTiming.fromDate = fd.value;
      if (ft && ft.value) state.syncTiming.fromTime = ft.value;
      if (td && td.value) state.syncTiming.toDate   = td.value;
      if (tt && tt.value) state.syncTiming.toTime   = tt.value;

      var overlay = document.getElementById('sync-reassure-overlay');
      if (!overlay) return;
      var sheet = document.getElementById('sync-reassure-sheet');
      if (sheet) sheet.style.transform = 'translateY(100%)';
      setTimeout(function () {
        if (overlay.parentNode) overlay.remove();
        if (startSync) {
          syncUpdateCardToRunning();
          syncSetStickyState('syncing');
          syncStartPhase1();
        }
      }, 260);
    }

    /* Swap card content once permission granted and sync starts */
    function syncUpdateCardToRunning() {
      var title  = document.getElementById('sync-card-title');
      var sub    = document.getElementById('sync-card-sub');
      var win    = document.getElementById('sync-card-window');
      var status = document.getElementById('sync-card-status');
      var t      = state.syncTiming;
      if (title)  title.textContent  = 'You\'re all set for Iceland.';
      if (sub)    sub.textContent    = 'Just enjoy the trip and keep clicking photos.';
      if (win)    win.style.display  = 'none';
      if (status) {
        status.textContent = 'Looking from ' + t.fromDate + ', ' + t.fromTime +
                             ' to ' + t.toDate + ', ' + t.toTime;
        status.style.display = 'block';
      }
    }

    /* Swap sticky bottom area without re-rendering the whole screen */
    function syncSetStickyState(s) {
      var primary = document.getElementById('sync-primary-btn');
      if (!primary) return;
      if (s === 'syncing') {
        primary.textContent          = 'View my photos';
        primary.disabled             = true;
        primary.style.background     = T.bgSub;
        primary.style.color          = T.textT;
        primary.style.cursor         = 'default';
        primary.onclick              = null;
      } else if (s === 'done') {
        primary.textContent          = 'View my photos';
        primary.disabled             = false;
        primary.style.background     = T.blue;
        primary.style.color          = '#fff';
        primary.style.cursor         = 'pointer';
        primary.onclick              = function () { go('varun-tagging'); };
      }
    }

    function syncStartPhase1() {
      clearInterval(syncPhaseInt);
      syncPhaseInt = setInterval(function () {
        syncProg += 1.0;
        if (syncProg >= 60) {
          syncProg = 60;
          clearInterval(syncPhaseInt);
          syncUpdateBar(60);
          /* Show amber connection lost banner */
          var banner = document.getElementById('sync-amber');
          if (banner) {
            banner.style.display = 'flex';
            requestAnimationFrame(function () {
              requestAnimationFrame(function () { banner.style.opacity = '1'; });
            });
          }
          setTimeout(function () {
            var b = document.getElementById('sync-amber');
            if (b) {
              b.style.opacity = '0';
              setTimeout(function () { if (b) b.style.display = 'none'; }, 300);
            }
            syncStartPhase2();
          }, 1000);
        } else {
          syncUpdateBar(syncProg);
        }
      }, 25); /* 60 ticks × 25ms = 1500ms */
    }

    function syncStartPhase2() {
      clearInterval(syncPhaseInt);
      syncPhaseInt = setInterval(function () {
        syncProg += 1.0;
        if (syncProg >= 100) {
          syncProg = 100;
          clearInterval(syncPhaseInt);
          syncUpdateBar(100);
          syncComplete();
        } else {
          syncUpdateBar(syncProg);
        }
      }, 37); /* 40 ticks × 37ms ≈ 1480ms */
    }

    function showConfetti() {
      var phone    = document.getElementById('phone');
      if (!phone) return;
      var colors   = ['#3B82F6','#F97316','#22C55E','#A855F7','#EF4444','#FACC15'];
      var pieces   = 48;
      var container = document.createElement('div');
      container.id  = 'confetti-burst';
      container.setAttribute('style',
        'position:absolute;inset:0;pointer-events:none;z-index:9999;overflow:hidden;'
      );
      for (var i = 0; i < pieces; i++) {
        var dot = document.createElement('div');
        var color  = colors[i % colors.length];
        var size   = (Math.random() * 7 + 5) + 'px';
        var left   = (Math.random() * 100) + '%';
        var delay  = (Math.random() * 0.4).toFixed(2) + 's';
        var dur    = (Math.random() * 0.8 + 0.9).toFixed(2) + 's';
        var rotate = (Math.random() * 360) + 'deg';
        dot.setAttribute('style',
          'position:absolute;top:-10px;left:' + left + ';' +
          'width:' + size + ';height:' + size + ';border-radius:2px;' +
          'background:' + color + ';' +
          'animation:confettiFall ' + dur + ' ' + delay + ' ease-in forwards;' +
          'transform:rotate(' + rotate + ');'
        );
        container.appendChild(dot);
      }
      /* Inject keyframes once */
      if (!document.getElementById('confetti-style')) {
        var sty = document.createElement('style');
        sty.id  = 'confetti-style';
        sty.textContent = (
          '@keyframes confettiFall {' +
            '0%   { transform:translateY(0) rotate(0deg);   opacity:1; }' +
            '80%  { opacity:1; }' +
            '100% { transform:translateY(700px) rotate(720deg); opacity:0; }' +
          '}'
        );
        document.head.appendChild(sty);
      }
      phone.appendChild(container);
      setTimeout(function () { if (container.parentNode) container.remove(); }, 2200);
    }

    function syncComplete() {
      syncDone  = true;
      hasSynced = true;
      /* Hide status line — trip window is shown inside results instead */
      var statusLine = document.getElementById('sync-card-status');
      if (statusLine) statusLine.style.display = 'none';
      var prog = document.getElementById('sync-progress-section');
      if (prog) {
        prog.style.transition = 'opacity .3s';
        prog.style.opacity    = '0';
        setTimeout(function () {
          if (prog.parentNode) prog.remove();
          var results = document.getElementById('sync-results');
          if (results) {
            results.style.display    = 'block';
            results.style.opacity    = '0';
            results.style.transition = 'opacity .3s';
            requestAnimationFrame(function () {
              requestAnimationFrame(function () { results.style.opacity = '1'; });
            });
          }
          showConfetti();
          /* Fade to white then slide into My Photos */
          setTimeout(function () {
            var phone = document.getElementById('phone');
            if (!phone) { taggingOpenTab = 'my-photos'; go('varun-tagging'); return; }
            var veil = document.createElement('div');
            veil.style.cssText = (
              'position:absolute;inset:0;z-index:9998;' +
              'background:#fff;opacity:0;pointer-events:none;' +
              'transition:opacity .45s ease;'
            );
            phone.appendChild(veil);
            requestAnimationFrame(function () {
              requestAnimationFrame(function () {
                veil.style.opacity = '1';
                setTimeout(function () {
                  taggingOpenTab = 'my-photos';
                  go('varun-tagging');
                  /* Fade veil out over new screen */
                  setTimeout(function () {
                    veil.style.opacity = '0';
                    setTimeout(function () {
                      if (veil.parentNode) veil.parentNode.removeChild(veil);
                    }, 460);
                  }, 60);
                }, 480);
              });
            });
          }, 1600);
        }, 300);
      }
      syncSetStickyState('done');
      var laterBtn = document.getElementById('sync-later-btn');
      if (laterBtn) laterBtn.style.display = 'none';
    }

            ? '<div style="position:absolute;bottom:8px;right:8px;' +

                      '<svg width="11" height="11" viewBox="0 0 24 24" fill="none"' +
                           ' stroke="#fff" stroke-width="2.5"' +
                           ' stroke-linecap="round" stroke-linejoin="round">' +
                        '<path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>' +
                      '</svg>' +
                    '</div>'
                  : '') +
                (photo.downloaded
                  ? '<div style="width:22px;height:22px;border-radius:6px;' +
                               'background:rgba(0,0,0,.38);backdrop-filter:blur(6px);' +
                               'display:flex;align-items:center;justify-content:center;' +
                               'filter:drop-shadow(0 1px 2px rgba(0,0,0,.3));">' +
                      '<svg width="11" height="11" viewBox="0 0 24 24" fill="none"' +
                           ' stroke="#fff" stroke-width="2.5"' +
                           ' stroke-linecap="round" stroke-linejoin="round">' +
                        '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>' +

    /* ─── photo tap ─── */
    function taggingTapPhoto(id) {
      if (!taggingSelectMode) { taggingOpenPreview(id); return; }
      var idx = taggingSelected.indexOf(id);
      if (idx === -1) { taggingSelected.push(id); }
      else            { taggingSelected.splice(idx, 1); }
      if (taggingSelected.length === 0) { taggingExitSelect(); return; }
      taggingRefreshSelectionUI();
    }

    /* ─── full-screen photo viewer ─── */
    function taggingOpenPreview(id) {
      taggingPreviewIndex = TRIP_PHOTOS.findIndex(function(ph) { return ph.id === id; });
      if (taggingPreviewIndex === -1) return;
      pvCurrentPhotoId = id;
      pvDragging = false;

      var phone = document.getElementById('phone');
      var old   = document.getElementById('tagging-preview-overlay');
      if (old) old.parentNode.removeChild(old);

      var photo   = TRIP_PHOTOS[taggingPreviewIndex];
      var imgSrc  = PHOTO_FILES[(photo.id - 1) % PHOTO_FILES.length];
      var isLiked = !!pvPhotoLiked[photo.id];
      var likes   = pvGetLikes(photo.id);
      var cmts    = pvGetComments(photo.id);
      var counter = (taggingPreviewIndex + 1) + ' / ' + TRIP_PHOTOS.length;

      var overlay = document.createElement('div');
      overlay.id = 'tagging-preview-overlay';
      overlay.style.cssText = (
        'position:absolute;inset:0;background:#000;z-index:9000;' +
        'display:flex;flex-direction:column;opacity:0;transition:opacity .18s ease;'
      );

      var pvReact = pvPhotoReactions[photo.id] || '';
      overlay.innerHTML = (
        /* ── photo — pure, nothing overlaid except top bar ── */
        '<div id="pv-img-wrap" style="position:relative;flex:1;overflow:hidden;' +
                                     'display:flex;align-items:center;justify-content:center;">' +
          '<img id="pv-img" src="' + imgSrc + '"' +
               ' style="width:100%;height:100%;object-fit:contain;display:block;' +
                       'user-select:none;-webkit-user-select:none;" draggable="false">' +
          '<div id="pv-heart-burst" style="position:absolute;inset:0;display:flex;align-items:center;' +
                                          'justify-content:center;pointer-events:none;opacity:0;">' +
            '<span style="font-size:88px;filter:drop-shadow(0 4px 20px rgba(0,0,0,.5));">❤️</span>' +
          '</div>' +
          '<div id="pv-reaction-badge"' +
               ' style="position:absolute;bottom:12px;left:14px;font-size:34px;pointer-events:none;' +
                       'transition:opacity .2s,transform .25s;' +
                       'opacity:' + (pvReact ? '1' : '0') + ';' +
                       'transform:scale(' + (pvReact ? '1' : '0.4') + ');">' +
            pvReact +
          '</div>' +
          '<div id="pv-emoji-picker"' +
               ' style="position:absolute;bottom:10px;left:12px;z-index:20;display:none;' +
                       'background:rgba(15,15,15,.88);backdrop-filter:blur(14px);' +
                       'border-radius:32px;padding:8px 14px;flex-direction:row;gap:12px;">' +
            ['❤️','🔥','😍','😂','👏','😮'].map(function(e) {
              return '<button onclick="pvPickReaction(' + photo.id + ',\'' + e + '\')"' +
                             ' style="font-size:24px;border:none;background:none;cursor:pointer;padding:0;line-height:1;">' +
                       e + '</button>';
            }).join('') +
          '</div>' +
          /* top bar only — minimal */
          '<div style="position:absolute;top:0;left:0;right:0;z-index:10;' +
                      'background:linear-gradient(to bottom,rgba(0,0,0,.52),transparent);' +
                      'padding:16px 14px 40px;display:flex;align-items:center;justify-content:space-between;">' +
            '<button onclick="taggingClosePreview(false)"' +
                    ' style="width:34px;height:34px;border:none;border-radius:50%;' +
                           'background:rgba(255,255,255,.15);cursor:pointer;' +
                           'display:flex;align-items:center;justify-content:center;">' +
              '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">' +
                '<polyline points="15 18 9 12 15 6"/>' +
              '</svg>' +
            '</button>' +
            '<span id="pv-counter" style="font-size:13px;font-weight:600;color:rgba(255,255,255,.8);">' + counter + '</span>' +
          '</div>' +
        '</div>' + /* end pv-img-wrap */

        /* ── bottom zone: solid dark icon strip + white CTA ── */
        '<div id="pv-bottom-zone">' +
          pvBuildViewerBottom(photo.id, isLiked, likes, cmts.length, pvReact) +
        '</div>'
      );

      phone.appendChild(overlay);
      requestAnimationFrame(function() { overlay.style.opacity = '1'; });

      /* ── touch gestures ── */
      var wrap = document.getElementById('pv-img-wrap');

      wrap.addEventListener('touchstart', function(e) {
        pvTouchStartX = e.touches[0].clientX;
        pvTouchStartY = e.touches[0].clientY;
        pvDragging = false;
        /* double-tap to like */
        var now = Date.now();
        if (now - pvLastTap < 300) { pvDoubleTapLike(photo.id); }
        pvLastTap = now;
      }, { passive: true });

      wrap.addEventListener('touchmove', function(e) {
        var dx = e.touches[0].clientX - pvTouchStartX;
        var dy = e.touches[0].clientY - pvTouchStartY;
        if (!pvDragging) {
          if (Math.abs(dy) > 8 && Math.abs(dy) > Math.abs(dx)) pvDragging = 'v';
          else if (Math.abs(dx) > 8) pvDragging = 'h';
        }
        if (pvDragging === 'v' && dy > 0) {
          e.preventDefault();
          var sc = Math.max(0.78, 1 - dy / 380);
          wrap.style.transform = 'translateY(' + dy + 'px) scale(' + sc + ')';
          overlay.style.opacity = String(Math.max(0.1, 1 - dy / 260));
        }
      }, { passive: false });

      wrap.addEventListener('touchend', function(e) {
        var dx = e.changedTouches[0].clientX - pvTouchStartX;
        var dy = e.changedTouches[0].clientY - pvTouchStartY;
        if (pvDragging === 'v' && dy > 90) {
          /* swipe down → dismiss */
          wrap.style.transition = 'transform .22s ease';
          wrap.style.transform = 'translateY(120%) scale(0.8)';
          overlay.style.opacity = '0';
          setTimeout(function() { taggingClosePreview(true); }, 200);
        } else if (pvDragging === 'v') {
          /* snap back */
          wrap.style.transition = 'transform .25s cubic-bezier(.22,1,.36,1)';
          wrap.style.transform = '';
          overlay.style.opacity = '1';
          setTimeout(function() { wrap.style.transition = ''; }, 280);
        } else if (pvDragging === 'h' && Math.abs(dx) > 55) {
          taggingPreviewMove(dx < 0 ? 1 : -1);
        }
        pvDragging = false;
      }, { passive: true });
    }

    function taggingShareFromPreview() {
      var photo = TRIP_PHOTOS[taggingPreviewIndex];
      if (!photo) return;
      var photoId = photo.id;
      taggingClosePreview(false);
      /* Enter multi-select mode after the viewer fades out — user sees the
         selection bar + "Share to group" CTA and taps it intentionally */
      setTimeout(function() {
        taggingSelectMode = true;
        taggingSelected   = [photoId];
        taggingRefreshSelectionUI();
        /* pulse the cell so user's eye lands on it */
        var cell = document.getElementById('photo-cell-' + photoId);
        if (cell) {
          cell.style.transition = 'box-shadow .15s';
          cell.style.boxShadow  = '0 0 0 4px #1B4FD8, 0 8px 28px rgba(27,79,216,.5)';
          setTimeout(function() { cell.style.boxShadow = '0 16px 32px rgba(27,79,216,.12)'; }, 350);
        }
      }, 220);
    }

    function taggingClosePreview(instant) {
      var overlay = document.getElementById('tagging-preview-overlay');
      if (!overlay || !overlay.parentNode) return;
      if (instant) {
        overlay.parentNode.removeChild(overlay);
      } else {
        overlay.style.transition = 'opacity .2s ease';
        overlay.style.opacity = '0';
        setTimeout(function() { if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 200);
      }
      if (taggingPreviewTimer) { clearTimeout(taggingPreviewTimer); taggingPreviewTimer = null; }
    }

    function taggingPreviewMove(delta) {
      if (taggingPreviewIndex < 0) return;
      taggingPreviewIndex = (taggingPreviewIndex + TRIP_PHOTOS.length + delta) % TRIP_PHOTOS.length;
      taggingClosePreview(true);
      taggingOpenPreview(TRIP_PHOTOS[taggingPreviewIndex].id);
    }

      var btn = document.getElementById('pv-like-btn');

        btn.style.transform = 'scale(1.35)';
        setTimeout(function() {
          btn.style.transition = 'transform .2s cubic-bezier(.22,1,.36,1)';
          btn.style.transform  = 'scale(1)';

        btn.innerHTML = (
          '<svg width="28" height="28" viewBox="0 0 24 24" fill="#F43F5E" stroke="#F43F5E"' +

      var photo = TRIP_PHOTOS.find(function(p) { return p.id === photoId; });
      if (photo) photo.downloaded = true;

    function pvSubmitComment(photoId) {
      var inp = document.getElementById('pv-comment-inp');
      if (!inp || !inp.value.trim()) return;
      var text = inp.value.trim();
      inp.value = '';
      inp.focus();

      var newComment = {
        author: 'You', initials: 'YO',
        av: 'linear-gradient(135deg,#1B4FD8,#2D7DD2)',
        text: text, time: 'just now'
      };

      if (!pvPhotoComments[photoId]) pvPhotoComments[photoId] = pvGetComments(photoId);
      pvPhotoComments[photoId].push(newComment);

      var list = document.getElementById('pv-comment-list');
      if (list) {
        var row = document.createElement('div');
        row.innerHTML = pvCommentRow(newComment);
        list.appendChild(row.firstChild);
        list.scrollTop = list.scrollHeight;
      }
    }

      taggingSelected   = [firstId];

    function taggingPhotoMatchesFilter(photo) {
      var sceneOk = !taggingCategory || photo.scene === CAT_SCENE_MAP[taggingCategory];
      var faceOk  = !taggingFaceFilter || photo.by === taggingFaceFilter;
      return sceneOk && faceOk;
    }

    function taggingGetVisiblePhotoIds() {
      var ids = [];
      for (var i = 0; i < TRIP_PHOTOS.length; i++) {
        if (taggingPhotoMatchesFilter(TRIP_PHOTOS[i])) ids.push(TRIP_PHOTOS[i].id);
      }
      return ids;
    }

    function taggingSelectAllMatching() {
      var visibleIds = taggingGetVisiblePhotoIds();
      if (!visibleIds.length) return;
      taggingSelectMode = true;
      taggingSelected = visibleIds.slice();
      taggingRefreshSelectionUI();
    }

    function taggingGoShareRecipients() {
      console.log('taggingGoShareRecipients called selectedPhotos.length=', taggingSelected.length);
      if (!taggingSelected.length) return;
      taggingRecipientQuery = '';
      taggingRecipientsSelected = [];
      showTaggingShareSheet();
    }

    function taggingSaveSelectedPhotos() {
      if (!taggingSelected.length) return;
      showToast('Saved ' + taggingSelected.length + ' photo' + (taggingSelected.length !== 1 ? 's' : '') + ' to camera roll ✓', 'ok');
    }

    function pvFilmstripToggle(photoId) {
      var idx = pvFilmstripSel.indexOf(photoId);
      if (idx === -1) { pvFilmstripSel.push(photoId); }
      else if (pvFilmstripSel.length > 1) { pvFilmstripSel.splice(idx, 1); }
      var n = pvFilmstripSel.length;
      var countEl = document.getElementById('pv-fs-count');
      if (countEl) countEl.textContent = n + ' selected';
      var ctaEl = document.getElementById('pv-fs-cta');
      if (ctaEl) ctaEl.textContent = 'Share ' + n + ' photo' + (n !== 1 ? 's' : '') + ' to group  →';
      TRIP_PHOTOS.forEach(function(ph) {
        var sel  = pvFilmstripSel.indexOf(ph.id) !== -1;
        var cell = document.getElementById('pv-fs-cell-' + ph.id);
        var chk  = document.getElementById('pv-fs-chk-' + ph.id);
        if (cell) cell.style.borderColor = sel ? '#1B4FD8' : 'transparent';
        if (chk)  {
          chk.style.background = sel ? '#1B4FD8' : 'rgba(0,0,0,.3)';
          chk.innerHTML = sel ? '<svg width="9" height="9" viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>' : '';
        }
      });
    }

      var success = document.createElement('div');
      success.style.cssText = (
        'position:absolute;inset:0;z-index:300;background:rgba(0,0,0,.72);' +

        '<div style="text-align:center;padding:32px 24px;">' +
          '<div style="width:66px;height:66px;border-radius:50%;background:#22C55E;' +
                      'display:flex;align-items:center;justify-content:center;margin:0 auto 18px;">' +
            '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">' +
              '<polyline points="20 6 9 17 4 12"/>' +

    function pvShowEmojiPicker(photoId) {
      var picker = document.getElementById('pv-emoji-picker');
      if (!picker) return;
      var open = picker.style.display === 'flex';
      picker.style.display = open ? 'none' : 'flex';
    }

    function pvPickReaction(photoId, emoji) {
      /* Toggle off if same emoji tapped again */
      pvPhotoReactions[photoId] = (pvPhotoReactions[photoId] === emoji) ? '' : emoji;
      var badge  = document.getElementById('pv-reaction-badge');
      var btn    = document.getElementById('pv-emoji-btn');
      var picker = document.getElementById('pv-emoji-picker');
      var react  = pvPhotoReactions[photoId];
      if (badge) {
        badge.textContent = react;
        badge.style.opacity   = react ? '1' : '0';
        badge.style.transform = react ? 'scale(1)' : 'scale(0.4)';
      }
      if (btn) btn.textContent = react || '😊';
      if (picker) picker.style.display = 'none';
    }

    function pvShareFromViewer(photoId) {
      /* Share single photo from viewer → close preview → open recipient sheet */
      taggingClosePreview(false);
      setTimeout(function() {
        taggingSelected   = [photoId];
        taggingSelectMode = false;
        showTaggingShareSheet();
      }, 220);
    }

    function pvExternalShare(photoId) {
      /* Single-photo external share from viewer — reuse same sheet logic */
      taggingSelected = [photoId];
      taggingExternalShare();
      taggingSelected = [];
    }

    function taggingExternalShare() {
      if (!taggingSelected.length) return;
      var count = taggingSelected.length;
      /* Try native Web Share API first (works on real mobile) */
      if (navigator.share) {
        navigator.share({
          title: 'Iceland · Northern Lights photos',
          text: count + ' photo' + (count !== 1 ? 's' : '') + ' from our trip',
          url: window.location.href
        }).catch(function() {});
        return;
      }
      /* Fallback — show a small share options sheet */
      var old = document.getElementById('ext-share-sheet');
      if (old) { old.remove(); return; }
      var sheet = document.createElement('div');
      sheet.id = 'ext-share-sheet';
      sheet.style.cssText = (
        'position:absolute;inset:0;z-index:9200;display:flex;flex-direction:column;' +
        'justify-content:flex-end;background:rgba(0,0,0,0);transition:background .25s;'
      );
      var APPS = [
        { name:'WhatsApp',  emoji:'💬', bg:'#25D366', color:'#fff' },
        { name:'Instagram', emoji:'📸', bg:'linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)', color:'#fff' },
        { name:'Messages',  emoji:'💭', bg:'#34C759', color:'#fff' },
        { name:'More…',     emoji:'⋯',  bg:'#E2E8F0', color:'#334155' }
      ];
      var appsHTML = APPS.map(function(a) {
        return (
          '<div onclick="showToast(\'Opening ' + a.name + '…\');document.getElementById(\'ext-share-sheet\').remove()"' +
               ' style="display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;">' +
            '<div style="width:52px;height:52px;border-radius:14px;background:' + a.bg + ';' +
                        'display:flex;align-items:center;justify-content:center;' +
                        'font-size:24px;flex-shrink:0;">' + a.emoji + '</div>' +
            '<span style="font-size:11px;font-weight:500;color:#334155;">' + a.name + '</span>' +
          '</div>'
        );
      }).join('');
      sheet.innerHTML = (
        '<div id="ext-share-inner"' +
             ' style="background:#fff;border-radius:20px 20px 0 0;padding:20px 24px 32px;' +
                    'transform:translateY(100%);transition:transform .28s cubic-bezier(.22,1,.36,1);">' +
          '<div style="display:flex;justify-content:center;margin-bottom:16px;">' +
            '<div style="width:36px;height:4px;border-radius:2px;background:#E2E8F0;"></div>' +
          '</div>' +
          '<p style="font-size:14px;font-weight:600;color:#0F172A;margin:0 0 20px;">' +
            'Share ' + count + ' photo' + (count !== 1 ? 's' : '') + ' via' +
          '</p>' +
          '<div style="display:flex;justify-content:space-around;">' + appsHTML + '</div>' +
        '</div>'
      );
      sheet.addEventListener('click', function(e) { if (e.target === sheet) sheet.remove(); });
      var phone = document.getElementById('phone');
      if (phone) phone.appendChild(sheet);
      requestAnimationFrame(function() {
        sheet.style.background = 'rgba(0,0,0,.3)';
        var inner = document.getElementById('ext-share-inner');
        if (inner) inner.style.transform = 'translateY(0)';
      });
    }

    function taggingExitSelect() {
      taggingSelectMode = false;
      taggingSelected   = [];
      for (var i = 0; i < TRIP_PHOTOS.length; i++) {
        var chk = document.getElementById('check-' + TRIP_PHOTOS[i].id);
        if (chk) {
          chk.style.display     = 'none';
          chk.style.background  = 'rgba(255,255,255,.92)';
          chk.style.borderColor = 'rgba(0,0,0,.18)';
          chk.innerHTML         = '';
        }
        var cell = document.getElementById('photo-cell-' + TRIP_PHOTOS[i].id);
        if (cell) {
          cell.style.border    = '2px solid transparent';
          cell.style.transform = 'scale(1)';
          cell.style.boxShadow = 'none';
        }
      }
      taggingRestoreTopBar();
      /* restore nav bar */
      var navEl = document.getElementById('tagging-nav-bar');
      if (navEl) navEl.style.display = '';
      var ctaWrap = document.getElementById('tagging-share-bottom');
      if (ctaWrap) {
        ctaWrap.style.opacity = '0';
        if (ctaWrap.parentNode) {
          setTimeout(function () { ctaWrap.style.display = 'none'; }, 240);
        }
      }
    }

    /* ─── inline filter strip — contextual, based on the next batch of photos ─── */
    /* contextPhotos: the 9 photos that follow this strip in the grid            */
    function inlineFilterStrip(contextPhotos) {
      /* ── Find top-2 contributors in this batch ── */
      var byCounts = {};
      for (var bi = 0; bi < contextPhotos.length; bi++) {
        var byId = contextPhotos[bi].by;
        byCounts[byId] = (byCounts[byId] || 0) + 1;
      }
      /* Sort by count desc, take top 2 */
      var byKeys = Object.keys(byCounts).sort(function(a,b){ return byCounts[b]-byCounts[a]; });
      var top2By = byKeys.slice(0, 2);

      /* ── Find top-2 scenes in this batch → map to CAT_PILLS ── */
      var sceneCounts = {};
      for (var si2 = 0; si2 < contextPhotos.length; si2++) {
        var sc = contextPhotos[si2].scene;
        sceneCounts[sc] = (sceneCounts[sc] || 0) + 1;
      }
      var scKeys = Object.keys(sceneCounts).sort(function(a,b){ return sceneCounts[b]-sceneCounts[a]; });
      var top2Scenes = scKeys.slice(0, 2);

      /* Scene → CAT_PILLS lookup */
      var CAT_SCENE_MAP2 = {
        bonfire:'Bonfire', forest:'Forest', lake:'Lake', night:'Night',
        waterfall:'Waterfall', food:'Food', selfie:'Selfies', travel:'Travel', group:'Group'
      };
      var catLookup = {};
      for (var cli = 0; cli < CAT_PILLS.length; cli++) catLookup[CAT_PILLS[cli].cat] = CAT_PILLS[cli];

      /* ── Build people chips (top 2 only) ── */
      var pChips = '';
      /* People map for quick lookup */
      var pMap = {};
      for (var pm = 0; pm < AL_PEOPLE.length; pm++) pMap[AL_PEOPLE[pm].id] = AL_PEOPLE[pm];

      for (var ti = 0; ti < top2By.length; ti++) {
        var pid = top2By[ti];
        var person = pMap[pid];
        if (!person) continue;
        var on = (taggingFaceFilter === pid);
        pChips += (
          '<div onclick="taggingSetFace(\'' + pid + '\')"' +
               ' style="width:30px;height:30px;border-radius:50%;' +
                       'background:' + person.bg + ';' +
                       'display:flex;align-items:center;justify-content:center;' +
                       'cursor:pointer;flex-shrink:0;' +
                       'font-size:10px;font-weight:800;color:#fff;' +
                       'box-shadow:' + (on ? '0 0 0 2.5px ' + T.blue + ',0 0 0 4px rgba(27,79,216,.2)' : 'none') + ';' +
                       'opacity:' + (!taggingFaceFilter || on ? '1' : '0.45') + ';">' +
            pid +
          '</div>'
        );
      }

      /* ── Build category pills (top 2 scenes only) ── */
      var cPills = '';
      for (var tci = 0; tci < top2Scenes.length; tci++) {
        var catName = CAT_SCENE_MAP2[top2Scenes[tci]];
        var cp2 = catLookup[catName];
        if (!cp2) continue;
        var cOn = (taggingCategory === cp2.cat);
        cPills += (
          '<div onclick="taggingSetCategory(\'' + cp2.cat + '\')"' +
               ' style="display:inline-flex;align-items:center;gap:3px;' +
                       'height:26px;padding:0 9px;' +
                       'border-radius:13px;flex-shrink:0;cursor:pointer;' +
                       'background:' + (cOn ? cp2.bg : 'rgba(0,0,0,.06)') + ';' +
                       'border:1.5px solid ' + (cOn ? cp2.clr : 'transparent') + ';">' +
            '<span style="font-size:12px;line-height:1;">' + cp2.emoji + '</span>' +
            '<span style="font-size:11px;font-weight:600;color:' + (cOn ? cp2.clr : T.textS) + ';">' + cp2.cat + '</span>' +
          '</div>'
        );
      }

      return (
        '<div style="grid-column:1/-1;background:#F7F6F4;padding:8px 12px;margin:2px 0;">' +
          '<div class="hscroll"' +
               ' style="display:flex;align-items:center;gap:8px;overflow-x:auto;">' +
            /* Small "filter" label */
            '<span style="font-size:10px;font-weight:600;color:' + T.textT + ';' +
                         'letter-spacing:.04em;text-transform:uppercase;flex-shrink:0;">' +
              'Filter' +
            '</span>' +
            '<div style="width:1px;height:16px;background:rgba(0,0,0,.1);flex-shrink:0;"></div>' +
            pChips +
            (pChips && cPills
              ? '<div style="width:1px;height:16px;background:rgba(0,0,0,.1);flex-shrink:0;"></div>'
              : '') +
            cPills +
          '</div>' +
        '</div>'
      );
    }

    /* ─── sticky filter bar collapse/expand on scroll ─── */
    function taggingGridScroll(el) {
      /* Read scrollTop synchronously (must happen in scroll event) */
      _taggingScrollY = el.scrollTop;
      /* rAF debounce — only run style changes once per frame */
      if (_taggingScrollTick) return;
      _taggingScrollTick = true;
      var _snapY = _taggingScrollY;
      requestAnimationFrame(function () {
        _taggingScrollTick = false;
        var y    = _taggingScrollY;
        var prev = _snapY;
        var full   = document.getElementById('tagging-filters-full');
        var sticky = document.getElementById('tagging-sticky-bar');
        if (!full || !sticky) return;

        /* Collapse: scrolled down past 72px — filter fades+collapses, sticky fades in */
        if (y > 72 && prev <= 72) {
          full.style.height    = '0';
          full.style.opacity   = '0';
          /* Sticky: set height instantly, then fade in via opacity only (GPU composited) */
          sticky.style.transition = 'none';
          sticky.style.height     = '46px';
          sticky.style.opacity    = '0';
          requestAnimationFrame(function () {
            sticky.style.transition = 'opacity .2s ease';
            sticky.style.opacity    = '1';
          });
        }

        /* Expand: scrolled back up near top — sticky fades out, filter expands */
        if (y < 36 && prev >= 36) {
          /* Sticky: fade out first, then collapse height instantly after */
          sticky.style.transition = 'opacity .15s ease';
          sticky.style.opacity    = '0';
          setTimeout(function () {
            sticky.style.transition = 'none';
            sticky.style.height     = '0';
          }, 160);
          full.style.height  = (window._taggingFiltersH || 160) + 'px';
          full.style.opacity = '1';
          /* Reset sticky to people mode for next appearance */
          if (_stickyMode !== 'people') {
            _stickyMode = 'people';
            var pp2 = document.getElementById('sticky-people-panel');
            var cp2 = document.getElementById('sticky-cat-panel');
            var tb2 = document.getElementById('sticky-cat-toggle');
            if (pp2) pp2.style.display = 'flex';
            if (cp2) cp2.style.display = 'none';
            if (tb2) { tb2.style.background = T.bgSub; tb2.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="' + T.text + '" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>'; }
          }
        }
      });
    }

    /* Patch chip rows in-place — sheet stays open, no flicker */
    function grpFilterRefresh() {
      function chip(key, val, label) {
        var on = (key === 'sort' && groupFilterSort === val) ||
                 (key === 'media' && groupFilterMedia === val);
        var setter = key === 'sort'
          ? 'groupFilterSort=\'' + val + '\''
          : 'groupFilterMedia=\'' + val + '\'';
        return (
          '<button onclick="' + setter + ';grpFilterRefresh()"' +
                  ' style="height:34px;padding:0 16px;border-radius:20px;border:none;' +
                         'font-family:inherit;font-size:13px;font-weight:' + (on ? '600' : '400') + ';' +
                         'cursor:pointer;margin:0 6px 6px 0;' +
                         'background:' + (on ? T.blue : T.bgSub) + ';' +
                         'color:' + (on ? '#fff' : T.text) + ';">' +
            label +
          '</button>'
        );
      }
      var sc = document.getElementById('grp-sort-chips');
      var mc = document.getElementById('grp-media-chips');
      if (sc) sc.innerHTML = chip('sort','newest','Newest first') + chip('sort','oldest','Oldest first');
      if (mc) mc.innerHTML = chip('media','all','All') + chip('media','photos','Photos only') + chip('media','videos','Videos only');

    var CAT_SCENE_MAP = {

    function taggingSetCategory(cat) {
      taggingCategory = (taggingCategory === cat) ? '' : cat;
      /* Update pill visuals */
      var allCats = ['Bonfire','Forest','Lake','Night','Waterfall','Food','Selfies','Travel','Group'];
      for (var i = 0; i < allCats.length; i++) {
        var pill = document.getElementById('fcat-' + allCats[i]);
        if (!pill) continue;
        var on = (taggingCategory === allCats[i]);
        pill.style.opacity   = (!taggingCategory || on) ? '1' : '0.45';
        pill.style.transform = on ? 'scale(1.06)' : 'scale(1)';

      /* Filter photos by scene */
      var targetScene = taggingCategory ? (CAT_SCENE_MAP[taggingCategory] || '') : '';
      for (var j = 0; j < TRIP_PHOTOS.length; j++) {
        var ph   = TRIP_PHOTOS[j];

    function identifyPickName(name) {
      var names = ['Varun','Mayank','Kavitha','Beulah','Vishal'];
      for (var i = 0; i < names.length; i++) {
        var chip = document.getElementById('idchip-' + names[i]);
        if (!chip) continue;
        chip.style.background = (names[i] === name) ? T.blue   : T.bgSub;
        chip.style.color      = (names[i] === name) ? '#fff'   : T.text;
      }
      identifySelectedName = name;
      var btn = document.getElementById('identify-confirm-btn');
      if (btn) {
        btn.disabled         = false;
        btn.style.background = T.blue;
        btn.style.color      = '#fff';
        btn.style.cursor     = 'pointer';
      }

    function confirmIdentify(personId) {
      var name = identifySelectedName;
      var overlay = document.getElementById('identify-overlay');
      if (!overlay) return;
      var s = document.getElementById('identify-sheet');
      if (s) s.style.transform = 'translateY(100%)';
      setTimeout(function () {
        if (overlay.parentNode) overlay.remove();
        if (!name) return;
        /* Update people row avatar to identified state */
        var avId = (personId === '?') ? 'unk' : personId;
        var wrap = document.getElementById('people-avatar-' + avId);

    function momentASelectFace(idx) {

        if (i === idx) {
          c.style.borderColor = T.blue;

          c.style.borderColor = 'transparent';
          c.style.boxShadow   = 'none';

        btn.disabled        = false;
        btn.style.background = T.blue;

    function dismissMomentA(faceIdx) {
      var overlay = document.getElementById('moment-a-overlay');
      if (!overlay) return;
      var s = document.getElementById('moment-a-sheet');
      if (s) s.style.transform = 'translateY(100%)';
      setTimeout(function () {
        if (overlay.parentNode) overlay.remove();
        if (faceIdx === 0) {
          /* Confirm VR — update chip */
          var chip = document.getElementById('face-chip-VR');

          setTimeout(function () { showMomentB(); }, 2000);

    function completeShareWithGroup(shared) {
      groupPoolCount    = Math.min(groupPoolCount + shared.length, 60);
      groupDisplayCount = groupDisplayCount + shared.length;
      /* Track which photo IDs were shared so My Photos can badge them */
      for (var si = 0; si < shared.length; si++) {
        if (sharedPhotoIds.indexOf(shared[si]) === -1) sharedPhotoIds.push(shared[si]);
      }
      flyPhotosToGroupTab(shared);
    }

    function flyPhotosToGroupTab(shared) {
      var phone = document.getElementById('phone');
      if (!phone) { finishGroupShare(shared); return; }

      /* Target: the "Group photos" segmented tab button */
      var target = document.getElementById('seg-group');
      if (!target) { finishGroupShare(shared); return; }

      var phoneRect  = phone.getBoundingClientRect();
      var targetRect = target.getBoundingClientRect();
      var targetCx   = targetRect.left + targetRect.width  / 2 - phoneRect.left;
      var targetCy   = targetRect.top  + targetRect.height / 2 - phoneRect.top;

      var landed = 0;
      var total  = shared.length;

      for (var i = 0; i < total; i++) {
        (function (pid, idx) {
          setTimeout(function () {
            var cell = document.getElementById('photo-cell-' + pid);
            if (!cell) { if (++landed === total) finishGroupShare(shared); return; }

            var cellRect = cell.getBoundingClientRect();
            var cx   = cellRect.left + cellRect.width  / 2 - phoneRect.left;
            var cy   = cellRect.top  + cellRect.height / 2 - phoneRect.top;
            var size = Math.round(Math.min(cellRect.width, cellRect.height) * 0.72);

            /* Dim source cell */
            cell.style.transition = 'opacity .15s';
            cell.style.opacity    = '0.35';

            /* Clone thumbnail */
            var thumb = document.createElement('div');
            thumb.style.cssText = (
              'position:absolute;z-index:9999;pointer-events:none;' +
              'width:' + size + 'px;height:' + size + 'px;' +
              'border-radius:8px;overflow:hidden;' +
              'left:' + (cx - size / 2) + 'px;top:' + (cy - size / 2) + 'px;' +
              'box-shadow:0 4px 18px rgba(0,0,0,.32);' +
              'transition:left .42s cubic-bezier(.4,0,.2,1),' +
                          'top .42s cubic-bezier(.4,0,.2,1),' +
                          'width .42s ease,height .42s ease,' +
                          'border-radius .42s ease,' +
                          'opacity .28s ease .18s;'
            );
            var img = cell.querySelector('img');
            if (img) {
              var clone = document.createElement('img');
              clone.src = img.src;
              clone.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
              thumb.appendChild(clone);
            }
            phone.appendChild(thumb);

            /* Fly to group tab */
            var finalSize = 24;
            requestAnimationFrame(function () {
              requestAnimationFrame(function () {
                thumb.style.left         = (targetCx - finalSize / 2) + 'px';
                thumb.style.top          = (targetCy - finalSize / 2) + 'px';
                thumb.style.width        = finalSize + 'px';
                thumb.style.height       = finalSize + 'px';
                thumb.style.borderRadius = '50%';
                thumb.style.opacity      = '0';
              });
            });

            /* After landing: pulse the tab badge */
            setTimeout(function () {
              if (thumb.parentNode) thumb.parentNode.removeChild(thumb);
              /* Pulse the group tab */
              var tabBtn = document.getElementById('seg-group');
              if (tabBtn) {
                tabBtn.style.transition = 'transform .12s ease';
                tabBtn.style.transform  = 'scale(1.12)';
                setTimeout(function () { tabBtn.style.transform = 'scale(1)'; }, 130);
              }
              if (++landed === total) finishGroupShare(shared);
            }, 500 + idx * 70);

          }, idx * 90);
        }(shared[i], i));
      }
    }

    function finishGroupShare(shared) {
      taggingExitSelect();
      groupPhotosUnlocked = true;
      var badge = document.getElementById('ttab-group-badge');
      if (badge) badge.textContent = groupDisplayCount;
      taggingSetTab('group');
      showToast('Your photos are now in the group 🎉');
    }

    /* ── Journey init — single entry point, resets all listing state ── */
    function startJourney(journey, dest, opts) {
      opts = opts || {};

    /* ── Config factory — called at render time so runtime state is captured ── */
    function getAlbumListingConfig() {

    /* ── Helper: thumb strip ── */
    function alThumbStrip(thumbs) {
      var o = '<div style="position:absolute;bottom:12px;left:14px;display:flex;gap:4px;">';
      for (var i = 0; i < thumbs.length; i++) {
        o += '<div style="width:30px;height:30px;border-radius:6px;overflow:hidden;border:1.5px solid rgba(255,255,255,.5);">' +
               '<img src="' + PHOTO_FILES[thumbs[i]] + '" style="width:100%;height:100%;object-fit:cover;display:block;">' +
             '</div>';
      }
      return o + '<div style="width:30px;height:30px;border-radius:6px;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);border:1.5px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;"><span style="font-size:9px;font-weight:700;color:#fff;">+30</span></div></div>';
    }

    /* ── Helper: face stack (up to 3 overlapping avatars + overflow) ── */
    function alFaceStack(ids) {
      var o = '<div style="display:flex;">';
      var shown = Math.min(ids.length, 3);
      for (var i = 0; i < shown; i++) {
        var p = null;
        for (var j = 0; j < AL_PEOPLE.length; j++) { if (AL_PEOPLE[j].id === ids[i]) { p = AL_PEOPLE[j]; break; } }
        if (!p) continue;
        o += '<div style="width:20px;height:20px;border-radius:50%;background:' + p.bg + ';border:1.5px solid #fff;margin-left:' + (i > 0 ? '-5px' : '0') + ';display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;color:#fff;">' + p.id[0] + '</div>';
      }
      if (ids.length > 3) {
        o += '<div style="width:20px;height:20px;border-radius:50%;background:' + T.bgSub + ';border:1.5px solid #fff;margin-left:-5px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:' + T.textT + ';">+' + (ids.length - 3) + '</div>';
      }
      return o + '</div>';
    }

    /* ── Helper: live / invite card (large, always pinned top) ── */
    function alLiveCard(a) {

      return (
        '<div' + open + ' style="background:#fff;border-radius:18px;overflow:hidden;margin-bottom:20px;box-shadow:0 2px 16px rgba(0,0,0,.10);' + cur + '">' +

            (a.cta || '') +
          '</div>' +
